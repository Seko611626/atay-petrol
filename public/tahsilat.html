<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahsilat | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f0f4f8;
        }
        
        .btn-primary {
            background: #0A2F6C;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            background: #1E4D8C;
        }
        
        .admin-only {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen">
    <nav class="bg-[#0A2F6C] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">💵 TAHSİLAT İŞLEMLERİ</h1>
            </div>
            <div class="flex gap-2 flex-wrap">
                <a href="dashboard.html" class="px-3 py-2 rounded-lg hover:bg-white/10">🏠 Ana</a>
                <a href="borc.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="px-3 py-2 rounded-lg hover:bg-white/10">💵 Tahsilat</a>
                <a href="gider.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📉 Gider</a>
                <a href="kullanici.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <!-- Tahsilat Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-6 mb-6 hidden">
            <h2 class="text-xl font-bold mb-4 text-[#0A2F6C]">➕ Tahsilat Ekle</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="date" id="tarih" class="border p-3 rounded-xl">
                <select id="borc_id" class="border p-3 rounded-xl">
                    <option value="">Borç Seçin</option>
                </select>
                <input type="number" id="miktar" placeholder="Tahsilat Tutarı (TL)" class="border p-3 rounded-xl" step="any">
                <select id="odeme_yontemi" class="border p-3 rounded-xl">
                    <option value="Nakit">💵 Nakit</option>
                    <option value="Havale">🏦 Havale</option>
                    <option value="POS">💳 POS</option>
                </select>
                <button id="tahsilatEkleBtn" class="btn-primary text-white p-3 rounded-xl font-semibold col-span-1 md:col-span-4">Tahsilat Ekle</button>
            </div>
        </div>

        <!-- Tahsilat Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-[#0A2F6C]">📋 Tahsilat Geçmişi</h2>
                <div class="flex gap-2">
                    <input type="text" id="aramaInput" placeholder="🔍 Müşteri ara..." class="border p-2 rounded-xl text-sm">
                    <select id="filtreOdeme" class="border p-2 rounded-xl text-sm">
                        <option value="">Tümü</option>
                        <option value="Nakit">Nakit</option>
                        <option value="Havale">Havale</option>
                        <option value="POS">POS</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">Tarih</th>
                            <th class="p-3 text-left">Müşteri</th>
                            <th class="p-3 text-left">Tahsilat</th>
                            <th class="p-3 text-left">Ödeme Türü</th>
                        </tr>
                    </thead>
                    <tbody id="tahsilatListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let yetki = '';
        let tumTahsilatlar = [];

        async function loadBorclarSelect() {
            try {
                const res = await fetch('/api/borc');
                const borclar = await res.json();
                const select = document.getElementById('borc_id');
                if (!select) return;
                let html = '<option value="">Borç Seçin</option>';
                for (let i = 0; i < borclar.length; i++) {
                    if (borclar[i].kalan_tl > 0) {
                        html += '<option value="' + borclar[i].id + '">' + borclar[i].musteri_adi + ' - Kalan: ' + formatMoney(borclar[i].kalan_tl) + '</option>';
                    }
                }
                select.innerHTML = html;
            } catch (e) {
                console.error('Borçlar yüklenirken hata:', e);
            }
        }

        async function loadTahsilat() {
            try {
                const res = await fetch('/api/tahsilat');
                tumTahsilatlar = await res.json();
                filtreleVeGoster();
            } catch (e) {
                console.error('Tahsilatlar yüklenirken hata:', e);
                document.getElementById('tahsilatListesi').innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-500">Veritabanı hatası</td>';
            }
        }

        function filtreleVeGoster() {
            const aramaInput = document.getElementById('aramaInput');
            const arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            const odemeSelect = document.getElementById('filtreOdeme');
            const odemeFiltre = odemeSelect ? odemeSelect.value : '';

            let filtrelenmis = [];
            for (let i = 0; i < tumTahsilatlar.length; i++) {
                const t = tumTahsilatlar[i];
                const uyuyor = t.musteri_adi.toLowerCase().indexOf(arama) !== -1;
                const odemeUyuyor = odemeFiltre === '' || t.odeme_yontemi === odemeFiltre;
                if (uyuyor && odemeUyuyor) {
                    filtrelenmis.push(t);
                }
            }

            let html = '';
            for (let i = 0; i < filtrelenmis.length; i++) {
                const t = filtrelenmis[i];
                let odemeIcon = '';
                if (t.odeme_yontemi === 'Nakit') odemeIcon = '💵';
                else if (t.odeme_yontemi === 'Havale') odemeIcon = '🏦';
                else odemeIcon = '💳';

                html += '<tr class="border-b hover:bg-gray-50">';
                html += '<td class="p-3">' + t.tarih + '</td>';
                html += '<td class="p-3 font-semibold">' + t.musteri_adi + '</td>';
                html += '<td class="p-3 font-bold text-green-600">' + formatMoney(t.miktar) + '</td>';
                html += '<td class="p-3">' + odemeIcon + ' ' + (t.odeme_yontemi || '-') + '</td>';
                html += '</tr>';
            }
            if (filtrelenmis.length === 0) {
                html = '<tr><td colspan="4" class="text-center py-8 text-gray-500">Tahsilat bulunamadı</td>';
            }
            document.getElementById('tahsilatListesi').innerHTML = html;
        }

        const tahsilatEkleBtn = document.getElementById('tahsilatEkleBtn');
        if (tahsilatEkleBtn) {
            tahsilatEkleBtn.addEventListener('click', async function() {
                const tarih = document.getElementById('tarih').value;
                const borc_id = parseInt(document.getElementById('borc_id').value);
                const miktar = parseFloat(document.getElementById('miktar').value);
                const odeme_yontemi = document.getElementById('odeme_yontemi').value;

                if (!tarih || !borc_id || !miktar) {
                    alert('Tarih, borç ve tahsilat tutarı giriniz');
                    return;
                }

                try {
                    const res = await fetch('/api/tahsilat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            tarih,
                            borc_id,
                            miktar,
                            odeme_yontemi
                        })
                    });
                    if (res.ok) {
                        alert('Tahsilat eklendi');
                        document.getElementById('tarih').value = new Date().toISOString().slice(0, 10);
                        document.getElementById('miktar').value = '';
                        loadBorclarSelect();
                        loadTahsilat();
                    } else {
                        const err = await res.json();
                        alert('Hata: ' + (err.hata || 'Bilinmeyen hata'));
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            });
        }

        const aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        const odemeSelect = document.getElementById('filtreOdeme');
        if (odemeSelect) {
            odemeSelect.addEventListener('change', filtreleVeGoster);
        }

        const cikisBtn = document.getElementById('cikisBtn');
        if (cikisBtn) {
            cikisBtn.onclick = async function() {
                await fetch('/api/logout', {
                    method: 'POST'
                });
                window.location.href = '/';
            };
        }

        function formatMoney(amount) {
            if (amount === undefined || amount === null) amount = 0;
            return amount.toLocaleString('tr-TR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }) + ' ₺';
        }

        (async function() {
            try {
                const me = await fetch('/api/me');
                const user = await me.json();
                yetki = user.yetki;

                const adminForm = document.getElementById('adminForm');
                if (adminForm) {
                    if (yetki === 'admin') {
                        adminForm.classList.remove('hidden');
                    } else {
                        adminForm.classList.add('hidden');
                    }
                }

                const adminElements = document.querySelectorAll('.admin-only');
                for (let i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) {
                        if (yetki === 'admin') {
                            adminElements[i].style.display = '';
                        } else {
                            adminElements[i].style.display = 'none';
                        }
                    }
                }

                const tarihInput = document.getElementById('tarih');
                if (tarihInput) {
                    tarihInput.value = new Date().toISOString().slice(0, 10);
                }

                if (yetki === 'admin') {
                    await loadBorclarSelect();
                }
                await loadTahsilat();
            } catch (e) {
                console.error('Sayfa yüklenirken hata:', e);
            }
        })();
    </script>
</body>

</html>
