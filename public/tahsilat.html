<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahsilat - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Tahsilat Yönetimi</h2>
            <div class="nav-links" id="navLinks"></div>
        </div>

        <div id="adminForm" class="form-card" style="display:none;">
            <h3>➕ Yeni Tahsilat Ekle</h3>
            <div class="form-group"><label>Borç Seç</label><select id="borcSec"></select></div>
            <div class="form-group"><label>Tahsilat Miktarı (₺)</label><input type="number" id="miktar" step="0.01"></div>
            <div class="form-group"><label>Ödeme Türü</label><select id="odemeTuru"><option>Nakit</option><option>Havale</option><option>POS</option></select></div>
            <div class="form-group"><label>Tarih</label><input type="date" id="tarih"></div>
            <button class="btn-primary" onclick="tahsilatEkle()">Tahsilat Ekle</button>
        </div>

        <div class="table-container">
            <h3>📋 Tahsilat Geçmişi</h3>
            <table id="tahsilatTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Müşteri</th>
                        <th>Miktar</th>
                        <th>Ödeme Türü</th>
                        <th>Tarih</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let isAdmin = false;

        async function checkAuthAndRole() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user) window.location.href = '/index.html';
            isAdmin = user.rol === 'admin';

            const navLinks = document.getElementById('navLinks');
            if (isAdmin) {
                navLinks.innerHTML = `<a href="/admin.html">📊 Dashboard</a><a href="/borc.html">💰 Borçlar</a><a href="/tahsilat.html">💵 Tahsilat</a><a href="/gider.html">📉 Giderler</a><a href="/kullanici.html">👥 Kullanıcılar</a><a href="/loglar.html">📜 Loglar</a><a href="/rapor.html">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
                document.getElementById('adminForm').style.display = 'block';
                await borclariSelectYukle();
            } else {
                navLinks.innerHTML = `<a href="/viewer.html">📊 Dashboard</a><a href="/borc.html?viewer=1">💰 Borçlar</a><a href="/tahsilat.html?viewer=1">💵 Tahsilat</a><a href="/gider.html?viewer=1">📉 Giderler</a><a href="/rapor.html?viewer=1">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
            }
            tahsilatlariYukle();
        }

        async function borclariSelectYukle() {
            const res = await fetch('/api/borc');
            const borclar = await res.json();
            const select = document.getElementById('borcSec');
            select.innerHTML = '<option value="">Borç Seçin</option>';
            borclar.forEach(b => {
                select.innerHTML += `<option value="${b.id}">${b.musteri} - ${formatMoney(b.kalan)}</option>`;
            });
        }

        async function tahsilatEkle() {
            const borc_id = document.getElementById('borcSec').value;
            const miktar = parseFloat(document.getElementById('miktar').value);
            if (!borc_id || !miktar) {
                alert('Borç ve miktar seçin');
                return;
            }
            const data = {
                borc_id: parseInt(borc_id),
                miktar,
                odeme_turu: document.getElementById('odemeTuru').value,
                tarih: document.getElementById('tarih').value || new Date().toISOString().split('T')[0]
            };
            await fetch('/api/tahsilat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            alert('Tahsilat eklendi');
            tahsilatlariYukle();
            document.getElementById('miktar').value = '';
        }

        async function tahsilatlariYukle() {
            const res = await fetch('/api/borc');
            const borclar = await res.json();
            // Tahsilatlar için ayrı bir API yok, borçlardan kalan farkı gösteriyoruz
            const tbody = document.querySelector('#tahsilatTablosu tbody');
            tbody.innerHTML = '';
            borclar.forEach(b => {
                const tahsilEdilen = b.tutar - b.kalan;
                if (tahsilEdilen > 0) {
                    tbody.innerHTML += `<tr><td>${b.id}</td><td>${b.musteri}</td><td>${formatMoney(tahsilEdilen)}</td><td>-</td><td>${b.tarih}</td></tr>`;
                }
            });
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', {
                style: 'currency',
                currency: 'TRY'
            }).format(amount);
        }
        async function logout() {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/index.html';
        }

        document.getElementById('tarih').value = new Date().toISOString().split('T')[0];
        checkAuthAndRole();
    </script>
</body>

</html>
