<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Genel Rapor</h2>
            <div class="nav-links" id="navLinks"></div>
        </div>

        <div class="tarih-bar">
            <button class="btn-primary" onclick="excelExport('satis')">📥 Satış Export</button>
            <button class="btn-primary" onclick="excelExport('alis')">📥 Alış Export</button>
            <button class="btn-primary" onclick="excelExport('borc')">📥 Borç Export</button>
            <button class="btn-primary" onclick="excelExport('giderler')">📥 Gider Export</button>
        </div>

        <div class="table-container">
            <h3>📋 Tüm Satışlar</h3>
            <table id="satisTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tarih</th>
                        <th>Ürün</th>
                        <th>Litre</th>
                        <th>Fiyat</th>
                        <th>Tutar</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>📦 Tüm Alışlar</h3>
            <table id="alisTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tarih</th>
                        <th>Ürün</th>
                        <th>Litre</th>
                        <th>Fiyat</th>
                        <th>Tutar</th>
                        <th>Tedarikçi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>💰 Tüm Borçlar</h3>
            <table id="borcTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Müşteri</th>
                        <th>Ürün</th>
                        <th>Tutar</th>
                        <th>Kalan</th>
                        <th>Tarih</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="table-container">
            <h3>📉 Tüm Giderler</h3>
            <table id="giderTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kategori</th>
                        <th>Açıklama</th>
                        <th>Miktar</th>
                        <th>Tarih</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user) window.location.href = '/index.html';

            const navLinks = document.getElementById('navLinks');
            if (user.rol === 'admin') {
                navLinks.innerHTML = `<a href="/admin.html">📊 Dashboard</a><a href="/borc.html">💰 Borçlar</a><a href="/tahsilat.html">💵 Tahsilat</a><a href="/gider.html">📉 Giderler</a><a href="/kullanici.html">👥 Kullanıcılar</a><a href="/loglar.html">📜 Loglar</a><a href="/rapor.html">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
            } else {
                navLinks.innerHTML = `<a href="/viewer.html">📊 Dashboard</a><a href="/borc.html?viewer=1">💰 Borçlar</a><a href="/tahsilat.html?viewer=1">💵 Tahsilat</a><a href="/gider.html?viewer=1">📉 Giderler</a><a href="/rapor.html?viewer=1">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
            }

            raporuYukle();
        }

        async function raporuYukle() {
            const res = await fetch('/api/rapor/tum');
            const data = await res.json();

            const satisTbody = document.querySelector('#satisTablosu tbody');
            satisTbody.innerHTML = '';
            data.satislar.forEach(s => {
                satisTbody.innerHTML += `<tr><td>${s.id}</td><td>${s.tarih}</td><td>${s.urun_adi}</td><td>${s.litre} L</td><td>${formatMoney(s.fiyat)}</td><td>${formatMoney(s.litre * s.fiyat)}</td></tr>`;
            });

            const alisTbody = document.querySelector('#alisTablosu tbody');
            alisTbody.innerHTML = '';
            data.alislar.forEach(a => {
                alisTbody.innerHTML += `<tr><td>${a.id}</td><td>${a.tarih}</td><td>${a.urun_adi}</td><td>${a.litre} L</td><td>${formatMoney(a.fiyat)}</td><td>${formatMoney(a.litre * a.fiyat)}</td><td>${a.tedarikci || '-'}</td></tr>`;
            });

            const borcTbody = document.querySelector('#borcTablosu tbody');
            borcTbody.innerHTML = '';
            data.borclar.forEach(b => {
                borcTbody.innerHTML += `<tr><td>${b.id}</td><td>${b.musteri}</td><td>${b.urun}</td><td>${formatMoney(b.tutar)}</td><td>${formatMoney(b.kalan)}</td><td>${b.tarih}</td></tr>`;
            });

            const giderTbody = document.querySelector('#giderTablosu tbody');
            giderTbody.innerHTML = '';
            data.giderler.forEach(g => {
                giderTbody.innerHTML += `<tr><td>${g.id}</td><td>${g.kategori}</td><td>${g.aciklama}</td><td>${formatMoney(g.miktar)}</td><td>${g.tarih}</td></tr>`;
            });
        }

        async function excelExport(tablo) {
            const res = await fetch(`/api/export/${tablo}`);
            const data = await res.json();
            let csv = Object.keys(data[0] || {}).join(',') + '\n';
            data.forEach(row => {
                csv += Object.values(row).join(',') + '\n';
            });
            const blob = new Blob([csv], {
                type: 'text/csv'
            });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${tablo}_rapor.csv`;
            link.click();
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', {
                style: 'currency',
                currency: 'TRY'
            }).format(amount);
        }
        async function logout() {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/index.html';
        }

        checkAuth();
    </script>
</body>

</html>
