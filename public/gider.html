<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Giderler | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            transition: all 0.3s ease;
        }
        
        .form-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 47, 108, 0.1);
        }
        
        .gider-card {
            transition: all 0.3s ease;
        }
        
        .gider-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="bg-gray-100">
    <nav class="navbar text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <div class="animate-float">
                    <h1 class="text-2xl font-bold">📉 GİDERLER</h1>
                </div>
            </div>
            <div class="space-x-2 flex flex-wrap gap-1">
                <a href="dashboard.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🏠 Ana</a>
                <a href="satis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💰 Satış</a>
                <a href="alis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🚛 Alış</a>
                <a href="gider.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📉 Gider</a>
                <a href="borc.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💵 Tahsilat</a>
                <a href="rapor.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📊 Rapor</a>
                <a href="kullanici.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition-all hover:scale-105">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 sm:p-6">
        <!-- Gider İstatistik Kartları -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-gradient-to-r from-red-50 to-rose-50 rounded-xl p-4 animate-fadeLeft gider-card">
                <p class="text-sm text-gray-500">📊 Toplam Gider</p>
                <p class="text-2xl font-bold text-red-600" id="toplamGider">0 ₺</p>
            </div>
            <div class="bg-gradient-to-r from-orange-50 to-amber-50 rounded-xl p-4 animate-fadeUp gider-card">
                <p class="text-sm text-gray-500">📅 Bu Ay Gider</p>
                <p class="text-2xl font-bold text-orange-600" id="aylikGider">0 ₺</p>
            </div>
            <div class="bg-gradient-to-r from-yellow-50 to-amber-50 rounded-xl p-4 animate-fadeDown gider-card">
                <p class="text-sm text-gray-500">💰 En Yüksek Gider</p>
                <p class="text-2xl font-bold text-yellow-600" id="maxGider">0 ₺</p>
            </div>
            <div class="bg-gradient-to-r from-purple-50 to-violet-50 rounded-xl p-4 animate-fadeRight gider-card">
                <p class="text-sm text-gray-500">📝 Gider Sayısı</p>
                <p class="text-2xl font-bold text-purple-600" id="giderSayisi">0</p>
            </div>
        </div>

        <!-- Gider Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-4 sm:p-6 mb-8 border-t-4 border-orange-500 form-card animate-scale">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-gradient-to-r from-orange-500 to-amber-600 rounded-xl flex items-center justify-center">
                    <span class="text-white text-xl">➕</span>
                </div>
                <h2 class="text-xl font-bold text-orange-600">Yeni Gider Ekle</h2>
            </div>
            <form id="giderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📅 Tarih</label>
                    <input type="date" id="tarih" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📂 Kategori</label>
                    <select id="kategori" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all" required>
                        <option value="">Seçiniz</option>
                        <option value="Elektrik">⚡ Elektrik</option>
                        <option value="Su">💧 Su</option>
                        <option value="Kira">🏠 Kira</option>
                        <option value="Personel">👥 Personel</option>
                        <option value="Bakım">🔧 Bakım</option>
                        <option value="Vergi">📄 Vergi</option>
                        <option value="Diğer">📌 Diğer</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">💰 Miktar (TL)</label>
                    <input type="number" id="miktar" placeholder="Gider Tutarı" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all" step="any" required>
                </div>
                <div class="md:col-span-2 lg:col-span-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">📝 Açıklama</label>
                    <input type="text" id="aciklama" placeholder="Açıklama (Opsiyonel)" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                </div>
                <div class="md:col-span-2 lg:col-span-3">
                    <button type="submit" class="bg-orange-600 text-white w-full py-3 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-orange-700 transition-all">
                        <span>💾</span> Gider Kaydet
                    </button>
                </div>
            </form>
        </div>

        <!-- Gider Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 animate-fadeUp">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-xl font-bold gradient-text">📋 Gider Geçmişi</h2>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="text" id="aramaInput" placeholder="🔍 Kategori veya açıklama ara..." class="border p-2 rounded-xl text-sm pl-8 w-48">
                        <span class="absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs">🔍</span>
                    </div>
                    <select id="kategoriFiltre" class="border p-2 rounded-xl text-sm">
                        <option value="">Tüm Kategoriler</option>
                        <option value="Elektrik">⚡ Elektrik</option>
                        <option value="Su">💧 Su</option>
                        <option value="Kira">🏠 Kira</option>
                        <option value="Personel">👥 Personel</option>
                        <option value="Bakım">🔧 Bakım</option>
                        <option value="Vergi">📄 Vergi</option>
                        <option value="Diğer">📌 Diğer</option>
                    </select>
                    <button onclick="exportGiderToExcel()" class="bg-green-500 text-white px-3 py-2 rounded-xl text-sm hover:bg-green-600 transition-all flex items-center gap-1">
                        📎 Excel
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <div id="giderListesi" class="min-w-[800px]"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        var yetki = '';
        var tumGiderler = [];

        async function loadGiderler() {
            var res = await fetch('/api/giderler');
            tumGiderler = await res.json();
            filtreleVeGoster();
            istatistikleriGuncelle();
        }

        function istatistikleriGuncelle() {
            var toplam = 0;
            var aylik = 0;
            var maxGider = 0;
            var ayBaslangic = new Date().getFullYear() + '-' + String(new Date().getMonth() + 1).padStart(2, '0') + '-01';

            for (var i = 0; i < tumGiderler.length; i++) {
                var g = tumGiderler[i];
                toplam += g.miktar;
                if (g.miktar > maxGider) maxGider = g.miktar;
                if (g.tarih >= ayBaslangic) aylik += g.miktar;
            }

            document.getElementById('toplamGider').innerHTML = formatMoney(toplam);
            document.getElementById('aylikGider').innerHTML = formatMoney(aylik);
            document.getElementById('maxGider').innerHTML = formatMoney(maxGider);
            document.getElementById('giderSayisi').innerHTML = tumGiderler.length;
        }

        function filtreleVeGoster() {
            var aramaInput = document.getElementById('aramaInput');
            var arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            var kategoriFiltre = document.getElementById('kategoriFiltre') ? document.getElementById('kategoriFiltre').value : '';

            var filtrelenmis = [];
            for (var i = 0; i < tumGiderler.length; i++) {
                var g = tumGiderler[i];
                var kategoriVar = g.kategori && g.kategori.toLowerCase().indexOf(arama) !== -1;
                var aciklamaVar = g.aciklama && g.aciklama.toLowerCase().indexOf(arama) !== -1;
                var uyuyorMu = kategoriVar || aciklamaVar;
                var kategoriUyuyor = kategoriFiltre === '' || g.kategori === kategoriFiltre;

                if (uyuyorMu && kategoriUyuyor) {
                    filtrelenmis.push(g);
                }
            }

            var toplamTutar = 0;
            for (var i = 0; i < filtrelenmis.length; i++) {
                toplamTutar += filtrelenmis[i].miktar;
            }

            var html = '';
            html += '<div class="mb-3 p-2 bg-gray-100 rounded-lg flex justify-between items-center">';
            html += '<span class="text-sm font-semibold">📊 Toplam Gider: ' + formatMoney(toplamTutar) + '</span>';
            html += '<span class="text-sm text-gray-500">' + filtrelenmis.length + ' kayıt</span>';
            html += '</div>';
            html += '<table class="w-full"><thead><tr class="bg-gradient-to-r from-gray-100 to-gray-200">';
            html += '<th class="p-3 rounded-tl-xl text-left">Tarih</th>';
            html += '<th class="p-3 text-left">Kategori</th>';
            html += '<th class="p-3 text-left">Açıklama</th>';
            html += '<th class="p-3 text-left">Miktar</th>';
            html += '<th class="p-3 rounded-tr-xl text-left">İşlemler</th>';
            html += '<tr></thead><tbody>';

            if (filtrelenmis.length === 0) {
                html += '<tr><td colspan="5" class="text-center py-8 text-gray-500">Gider bulunamadı</td>';
            } else {
                for (var i = 0; i < filtrelenmis.length; i++) {
                    var g = filtrelenmis[i];
                    var kategoriIcon = '';
                    if (g.kategori === 'Elektrik') kategoriIcon = '⚡';
                    else if (g.kategori === 'Su') kategoriIcon = '💧';
                    else if (g.kategori === 'Kira') kategoriIcon = '🏠';
                    else if (g.kategori === 'Personel') kategoriIcon = '👥';
                    else if (g.kategori === 'Bakım') kategoriIcon = '🔧';
                    else if (g.kategori === 'Vergi') kategoriIcon = '📄';
                    else kategoriIcon = '📌';

                    html += '<tr class="table-row border-b hover:bg-gray-50">';
                    html += '<td class="p-3">' + formatDate(g.tarih) + '</td>';
                    html += '<td class="p-3">' + kategoriIcon + ' ' + g.kategori + '</td>';
                    html += '<td class="p-3">' + (g.aciklama || '-') + '</td>';
                    html += '<td class="p-3 font-bold text-red-600">' + formatMoney(g.miktar) + '</td>';
                    html += '<td class="p-3">';
                    if (yetki === 'admin') {
                        html += '<button onclick="deleteGider(' + g.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-red-600 transition-all">🗑️ Sil</button>';
                    } else {
                        html += '-';
                    }
                    html += '</td></tr>';
                }
            }
            html += '</tbody></table>';
            document.getElementById('giderListesi').innerHTML = html;
        }

        window.deleteGider = async function(id) {
            if (confirm('Bu gider kaydını silmek istediğinize emin misiniz?')) {
                var res = await fetch('/api/gider/' + id, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    showToast('✅ Gider silindi', 'success');
                    loadGiderler();
                } else {
                    showToast('❌ Silme hatası', 'error');
                }
            }
        };

        window.exportGiderToExcel = function() {
            if (tumGiderler.length === 0) {
                showToast('Veri yok', 'warning');
                return;
            }
            var exportData = [];
            for (var i = 0; i < tumGiderler.length; i++) {
                var g = tumGiderler[i];
                exportData.push({
                    Tarih: g.tarih,
                    Kategori: g.kategori,
                    Aciklama: g.aciklama || '-',
                    Miktar: g.miktar
                });
            }
            exportToExcel(exportData, 'giderler');
        };

        var giderForm = document.getElementById('giderForm');
        if (giderForm) {
            giderForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                var data = {
                    tarih: document.getElementById('tarih').value,
                    kategori: document.getElementById('kategori').value,
                    aciklama: document.getElementById('aciklama').value,
                    miktar: parseFloat(document.getElementById('miktar').value)
                };

                var res = await fetch('/api/gider', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast('✅ Gider başarıyla eklendi', 'success');
                    loadGiderler();
                    giderForm.reset();
                    setTodayDate('tarih');
                } else {
                    var err = await res.json();
                    showToast('❌ ' + (err.hata || 'Yetkiniz yok'), 'error');
                }
            });
        }

        var aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        var kategoriFiltre = document.getElementById('kategoriFiltre');
        if (kategoriFiltre) {
            kategoriFiltre.addEventListener('change', filtreleVeGoster);
        }

        (async function() {
            var me = await fetch('/api/me');
            var user = await me.json();
            yetki = user.yetki;

            if (yetki === 'admin') {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.classList.remove('hidden');
                setTodayDate('tarih');
            } else {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.remove();
                var adminElements = document.querySelectorAll('.admin-only');
                for (var i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) adminElements[i].style.display = 'none';
                }
            }

            await loadGiderler();
        })();
    </script>
</body>

</html>
