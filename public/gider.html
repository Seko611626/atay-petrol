<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giderler - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Gider Yönetimi</h2>
            <div class="nav-links" id="navLinks"></div>
        </div>

        <div id="adminForm" class="form-card" style="display:none;">
            <h3>➕ Yeni Gider Ekle</h3>
            <div class="form-group"><label>Kategori</label><select id="kategori"><option>Elektrik</option><option>Su</option><option>Personel</option><option>Kira</option><option>Diğer</option></select></div>
            <div class="form-group"><label>Açıklama</label><input type="text" id="aciklama" placeholder="Açıklama"></div>
            <div class="form-group"><label>Miktar (₺)</label><input type="number" id="miktar" step="0.01"></div>
            <div class="form-group"><label>Tarih</label><input type="date" id="tarih"></div>
            <button class="btn-primary" onclick="giderEkle()">Gider Ekle</button>
        </div>

        <div class="tarih-bar">
            <label>📅 Tarih:</label>
            <input type="date" id="tarihSecici">
            <button class="btn-primary" onclick="giderleriYukle()">Filtrele</button>
        </div>

        <div class="table-container">
            <h3>📋 Gider Listesi</h3>
            <table id="giderTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kategori</th>
                        <th>Açıklama</th>
                        <th>Miktar</th>
                        <th>Tarih</th>
                        <th id="silBaslik">İşlem</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let currentDate = new Date().toISOString().split('T')[0];

        async function checkAuthAndRole() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user) window.location.href = '/index.html';
            isAdmin = user.rol === 'admin';

            const navLinks = document.getElementById('navLinks');
            if (isAdmin) {
                navLinks.innerHTML = `<a href="/admin.html">📊 Dashboard</a><a href="/borc.html">💰 Borçlar</a><a href="/tahsilat.html">💵 Tahsilat</a><a href="/gider.html">📉 Giderler</a><a href="/kullanici.html">👥 Kullanıcılar</a><a href="/loglar.html">📜 Loglar</a><a href="/rapor.html">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
                document.getElementById('adminForm').style.display = 'block';
                document.getElementById('silBaslik').style.display = 'table-cell';
            } else {
                navLinks.innerHTML = `<a href="/viewer.html">📊 Dashboard</a><a href="/borc.html?viewer=1">💰 Borçlar</a><a href="/tahsilat.html?viewer=1">💵 Tahsilat</a><a href="/gider.html?viewer=1">📉 Giderler</a><a href="/rapor.html?viewer=1">📋 Rapor</a><button onclick="logout()">🚪 Çıkış</button>`;
                document.getElementById('silBaslik').style.display = 'none';
            }

            document.getElementById('tarihSecici').value = currentDate;
            document.getElementById('tarihSecici').addEventListener('change', (e) => {
                currentDate = e.target.value;
                giderleriYukle();
            });
            giderleriYukle();
        }

        async function giderleriYukle() {
            const res = await fetch(`/api/gider?tarih=${currentDate}`);
            const giderler = await res.json();
            const tbody = document.querySelector('#giderTablosu tbody');
            tbody.innerHTML = '';
            giderler.forEach(g => {
                const row = tbody.insertRow();
                let silButton = '';
                if (isAdmin) silButton = `<td><button class="btn-danger" onclick="giderSil(${g.id})">Sil</button></td>`;
                row.innerHTML = `
                    <td>${g.id}</td>
                    <td>${g.kategori}</td>
                    <td>${g.aciklama}</td>
                    <td>${formatMoney(g.miktar)}</td>
                    <td>${g.tarih}</td>
                    ${silButton ? silButton : '<td></td>'}
                `;
            });
        }

        async function giderEkle() {
            const data = {
                kategori: document.getElementById('kategori').value,
                aciklama: document.getElementById('aciklama').value,
                miktar: parseFloat(document.getElementById('miktar').value),
                tarih: document.getElementById('tarih').value || new Date().toISOString().split('T')[0]
            };
            if (!data.miktar) {
                alert('Miktar girin');
                return;
            }
            await fetch('/api/gider', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            alert('Gider eklendi');
            giderleriYukle();
            document.getElementById('aciklama').value = '';
            document.getElementById('miktar').value = '';
        }

        async function giderSil(id) {
            if (confirm('Gideri silmek istediğinize emin misiniz?')) {
                await fetch(`/api/gider/${id}`, {
                    method: 'DELETE'
                });
                giderleriYukle();
            }
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', {
                style: 'currency',
                currency: 'TRY'
            }).format(amount);
        }
        async function logout() {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/index.html';
        }

        document.getElementById('tarih').value = new Date().toISOString().split('T')[0];
        checkAuthAndRole();
    </script>
</body>

</html>
