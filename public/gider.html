<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giderler | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f0f4f8;
        }
        
        .btn-primary {
            background: #0A2F6C;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            background: #1E4D8C;
        }
        
        .admin-only {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen">
    <nav class="bg-[#0A2F6C] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">📉 GİDERLER</h1>
            </div>
            <div class="flex gap-2 flex-wrap">
                <a href="dashboard.html" class="px-3 py-2 rounded-lg hover:bg-white/10">🏠 Ana</a>
                <a href="borc.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="px-3 py-2 rounded-lg hover:bg-white/10">💵 Tahsilat</a>
                <a href="gider.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📉 Gider</a>
                <a href="kullanici.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <!-- Gider Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-6 mb-6 hidden">
            <h2 class="text-xl font-bold mb-4 text-[#0A2F6C]">➕ Yeni Gider Ekle</h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="date" id="tarih" class="border p-3 rounded-xl">
                <select id="kategori" class="border p-3 rounded-xl">
                    <option value="Elektrik">⚡ Elektrik</option>
                    <option value="Su">💧 Su</option>
                    <option value="Kira">🏠 Kira</option>
                    <option value="Personel">👥 Personel</option>
                    <option value="Bakım">🔧 Bakım</option>
                    <option value="Vergi">📄 Vergi</option>
                    <option value="Diğer">📌 Diğer</option>
                </select>
                <input type="text" id="aciklama" placeholder="Açıklama" class="border p-3 rounded-xl">
                <input type="number" id="miktar" placeholder="Miktar (TL)" class="border p-3 rounded-xl" step="any">
                <button id="giderEkleBtn" class="btn-primary text-white p-3 rounded-xl font-semibold col-span-1 md:col-span-5">Gider Ekle</button>
            </div>
        </div>

        <!-- Gider Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-[#0A2F6C]">📋 Gider Geçmişi</h2>
                <div class="flex gap-2">
                    <input type="text" id="aramaInput" placeholder="🔍 Kategori veya açıklama ara..." class="border p-2 rounded-xl text-sm">
                    <select id="filtreKategori" class="border p-2 rounded-xl text-sm">
                        <option value="">Tüm Kategoriler</option>
                        <option value="Elektrik">Elektrik</option>
                        <option value="Su">Su</option>
                        <option value="Kira">Kira</option>
                        <option value="Personel">Personel</option>
                        <option value="Bakım">Bakım</option>
                        <option value="Vergi">Vergi</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">Tarih</th>
                            <th class="p-3 text-left">Kategori</th>
                            <th class="p-3 text-left">Açıklama</th>
                            <th class="p-3 text-left">Miktar</th>
                            <th class="p-3 text-left">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="giderListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let yetki = '';
        let tumGiderler = [];

        async function loadGiderler() {
            try {
                const res = await fetch('/api/giderler');
                tumGiderler = await res.json();
                filtreleVeGoster();
            } catch (e) {
                console.error('Giderler yüklenirken hata:', e);
                document.getElementById('giderListesi').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">Veritabanı hatası</td>';
            }
        }

        function filtreleVeGoster() {
            const aramaInput = document.getElementById('aramaInput');
            const arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            const kategoriSelect = document.getElementById('filtreKategori');
            const kategoriFiltre = kategoriSelect ? kategoriSelect.value : '';

            let filtrelenmis = [];
            for (let i = 0; i < tumGiderler.length; i++) {
                const g = tumGiderler[i];
                const uyuyor = (g.kategori && g.kategori.toLowerCase().indexOf(arama) !== -1) || (g.aciklama && g.aciklama.toLowerCase().indexOf(arama) !== -1);
                const kategoriUyuyor = kategoriFiltre === '' || g.kategori === kategoriFiltre;
                if (uyuyor && kategoriUyuyor) {
                    filtrelenmis.push(g);
                }
            }

            let html = '';
            for (let i = 0; i < filtrelenmis.length; i++) {
                const g = filtrelenmis[i];
                let icon = '';
                if (g.kategori === 'Elektrik') icon = '⚡';
                else if (g.kategori === 'Su') icon = '💧';
                else if (g.kategori === 'Kira') icon = '🏠';
                else if (g.kategori === 'Personel') icon = '👥';
                else if (g.kategori === 'Bakım') icon = '🔧';
                else if (g.kategori === 'Vergi') icon = '📄';
                else icon = '📌';

                html += '<tr class="border-b hover:bg-gray-50">';
                html += '<td class="p-3">' + g.tarih + '</td>';
                html += '<td class="p-3">' + icon + ' ' + g.kategori + '</td>';
                html += '<td class="p-3">' + (g.aciklama || '-') + '</td>';
                html += '<td class="p-3 font-bold text-red-600">' + formatMoney(g.miktar) + '</td>';
                html += '<td class="p-3">';
                if (yetki === 'admin') {
                    html += '<button onclick="deleteGider(' + g.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs">Sil</button>';
                } else {
                    html += '-';
                }
                html += '</tr>';
            }
            if (filtrelenmis.length === 0) {
                html = '<tr><td colspan="5" class="text-center py-8 text-gray-500">Gider bulunamadı</td>';
            }
            document.getElementById('giderListesi').innerHTML = html;
        }

        window.deleteGider = async function(id) {
            if (confirm('Bu gideri silmek istediğinize emin misiniz?')) {
                try {
                    const res = await fetch('/api/gider/' + id, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        alert('Gider silindi');
                        loadGiderler();
                    } else {
                        alert('Silme hatası');
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            }
        };

        const giderEkleBtn = document.getElementById('giderEkleBtn');
        if (giderEkleBtn) {
            giderEkleBtn.addEventListener('click', async function() {
                const tarih = document.getElementById('tarih').value;
                const kategori = document.getElementById('kategori').value;
                const aciklama = document.getElementById('aciklama').value;
                const miktar = parseFloat(document.getElementById('miktar').value);

                if (!tarih || !miktar) {
                    alert('Tarih ve miktar giriniz');
                    return;
                }

                try {
                    const res = await fetch('/api/gider', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            tarih,
                            kategori,
                            aciklama,
                            miktar
                        })
                    });
                    if (res.ok) {
                        alert('Gider eklendi');
                        document.getElementById('tarih').value = new Date().toISOString().slice(0, 10);
                        document.getElementById('aciklama').value = '';
                        document.getElementById('miktar').value = '';
                        loadGiderler();
                    } else {
                        const err = await res.json();
                        alert('Hata: ' + (err.hata || 'Bilinmeyen hata'));
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            });
        }

        const aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        const kategoriSelect = document.getElementById('filtreKategori');
        if (kategoriSelect) {
            kategoriSelect.addEventListener('change', filtreleVeGoster);
        }

        const cikisBtn = document.getElementById('cikisBtn');
        if (cikisBtn) {
            cikisBtn.onclick = async function() {
                await fetch('/api/logout', {
                    method: 'POST'
                });
                window.location.href = '/';
            };
        }

        function formatMoney(amount) {
            if (amount === undefined || amount === null) amount = 0;
            return amount.toLocaleString('tr-TR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }) + ' ₺';
        }

        (async function() {
            try {
                const me = await fetch('/api/me');
                const user = await me.json();
                yetki = user.yetki;

                const adminForm = document.getElementById('adminForm');
                if (adminForm) {
                    if (yetki === 'admin') {
                        adminForm.classList.remove('hidden');
                    } else {
                        adminForm.classList.add('hidden');
                    }
                }

                const adminElements = document.querySelectorAll('.admin-only');
                for (let i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) {
                        if (yetki === 'admin') {
                            adminElements[i].style.display = '';
                        } else {
                            adminElements[i].style.display = 'none';
                        }
                    }
                }

                const tarihInput = document.getElementById('tarih');
                if (tarihInput) {
                    tarihInput.value = new Date().toISOString().slice(0, 10);
                }

                await loadGiderler();
            } catch (e) {
                console.error('Sayfa yüklenirken hata:', e);
            }
        })();
    </script>
</body>

</html>
