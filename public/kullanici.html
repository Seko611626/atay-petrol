<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Yönetimi - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Kullanıcı Yönetimi</h2>
            <div class="nav-links">
                <a href="/admin.html">📊 Dashboard</a>
                <a href="/borc.html">💰 Borçlar</a>
                <a href="/tahsilat.html">💵 Tahsilat</a>
                <a href="/gider.html">📉 Giderler</a>
                <a href="/kullanici.html">👥 Kullanıcılar</a>
                <a href="/loglar.html">📜 Loglar</a>
                <a href="/rapor.html">📋 Rapor</a>
                <button onclick="logout()">🚪 Çıkış</button>
            </div>
        </div>

        <div class="form-card">
            <h3>➕ Yeni Kullanıcı Ekle</h3>
            <div class="form-group"><label>Ad Soyad</label><input type="text" id="adSoyad"></div>
            <div class="form-group"><label>E-posta</label><input type="email" id="email"></div>
            <div class="form-group"><label>Şifre</label><input type="password" id="sifre"></div>
            <div class="form-group"><label>Rol</label><select id="rol"><option value="izleyici">İzleyici</option><option value="admin">Admin</option></select></div>
            <button class="btn-primary" onclick="kullaniciEkle()">Kullanıcı Ekle</button>
        </div>

        <div class="table-container">
            <h3>📋 Kullanıcı Listesi</h3>
            <table id="kullaniciTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ad Soyad</th>
                        <th>E-posta</th>
                        <th>Rol</th>
                        <th>Kayıt Tarihi</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function kullanicilariYukle() {
            const res = await fetch('/api/kullanicilar');
            const kullanicilar = await res.json();
            const tbody = document.querySelector('#kullaniciTablosu tbody');
            tbody.innerHTML = '';
            kullanicilar.forEach(k => {
                        tbody.innerHTML += `
                    <tr>
                        <td>${k.id}</td>
                        <td>${k.ad_soyad || '-'}</td>
                        <td>${k.email}</td>
                        <td>${k.rol}</td>
                        <td>${k.created_at}</td>
                        <td>${k.rol !== 'admin' ? `<button class="btn-danger" onclick="kullaniciSil(${k.id})">Sil</button>` : '-'}</td>
                    </tr>
                `;
            });
        }

        async function kullaniciEkle() {
            const data = {
                ad_soyad: document.getElementById('adSoyad').value,
                email: document.getElementById('email').value,
                sifre: document.getElementById('sifre').value,
                rol: document.getElementById('rol').value
            };
            if (!data.email || !data.sifre) { alert('E-posta ve şifre gerekli'); return; }
            await fetch('/api/kullanicilar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            alert('Kullanıcı eklendi');
            kullanicilariYukle();
            document.getElementById('adSoyad').value = '';
            document.getElementById('email').value = '';
            document.getElementById('sifre').value = '';
        }

        async function kullaniciSil(id) {
            if (confirm('Kullanıcıyı silmek istediğinize emin misiniz?')) {
                await fetch(`/api/kullanicilar/${id}`, { method: 'DELETE' });
                kullanicilariYukle();
            }
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/index.html'; }
        
        // Admin kontrolü
        async function init() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user || user.rol !== 'admin') window.location.href = '/index.html';
            kullanicilariYukle();
        }
        init();
    </script>
</body>

</html>
