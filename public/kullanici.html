<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Yönetimi | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f0f4f8;
        }
        
        .btn-primary {
            background: #0A2F6C;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            background: #1E4D8C;
        }
    </style>
</head>

<body class="min-h-screen">
    <nav class="bg-[#0A2F6C] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">👥 KULLANICI YÖNETİMİ</h1>
                <span class="text-xs bg-red-500/20 text-red-300 px-2 py-1 rounded-full">Admin Panel</span>
            </div>
            <div class="flex gap-2 flex-wrap">
                <a href="dashboard.html" class="px-3 py-2 rounded-lg hover:bg-white/10">🏠 Ana</a>
                <a href="borc.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="px-3 py-2 rounded-lg hover:bg-white/10">💵 Tahsilat</a>
                <a href="gider.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📉 Gider</a>
                <a href="kullanici.html" class="px-3 py-2 rounded-lg hover:bg-white/10">👥 Kullanıcılar</a>
                <a href="loglar.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <!-- Kullanıcı Ekleme Formu -->
        <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
            <h2 class="text-xl font-bold mb-4 text-[#0A2F6C]">➕ Yeni Kullanıcı Ekle</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="email" id="email" placeholder="E-posta" class="border p-3 rounded-xl">
                <input type="password" id="sifre" placeholder="Şifre" class="border p-3 rounded-xl">
                <input type="text" id="adsoyad" placeholder="Ad Soyad" class="border p-3 rounded-xl">
                <select id="yetki" class="border p-3 rounded-xl">
                    <option value="user">👁️ İzleyici</option>
                    <option value="admin">👑 Admin</option>
                </select>
                <button id="kullaniciEkleBtn" class="btn-primary text-white p-3 rounded-xl font-semibold col-span-1 md:col-span-4">Kullanıcı Ekle</button>
            </div>
        </div>

        <!-- Kullanıcı Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-6">
            <h2 class="text-xl font-bold mb-4 text-[#0A2F6C]">📋 Mevcut Kullanıcılar</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">ID</th>
                            <th class="p-3 text-left">E-posta</th>
                            <th class="p-3 text-left">Ad Soyad</th>
                            <th class="p-3 text-left">Yetki</th>
                            <th class="p-3 text-left">Durum</th>
                            <th class="p-3 text-left">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="kullaniciListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadKullanicilar() {
            try {
                const res = await fetch('/api/kullanicilar');
                const kullanicilar = await res.json();
                let html = '';
                for (let i = 0; i < kullanicilar.length; i++) {
                    const k = kullanicilar[i];
                    const yetkiText = k.yetki === 'admin' ? '👑 Admin' : '👁️ İzleyici';
                    const yetkiClass = k.yetki === 'admin' ? 'text-purple-600' : 'text-green-600';
                    const durumText = k.aktif == 1 ? '✅ Aktif' : '❌ Pasif';
                    const durumClass = k.aktif == 1 ? 'text-green-600' : 'text-red-600';
                    html += '<tr class="border-b hover:bg-gray-50">';
                    html += '<td class="p-3">' + k.id + '</td>';
                    html += '<td class="p-3">' + k.email + '</td>';
                    html += '<td class="p-3 font-semibold">' + k.adsoyad + '</td>';
                    html += '<td class="p-3 ' + yetkiClass + '">' + yetkiText + '</td>';
                    html += '<td class="p-3 ' + durumClass + '">' + durumText + '</td>';
                    html += '<td class="p-3">';
                    html += '<button onclick="editKullanici(' + k.id + ', \'' + k.adsoyad + '\', \'' + k.yetki + '\', ' + k.aktif + ')" class="bg-yellow-500 text-white px-2 py-1 rounded-lg text-xs mr-1">Düzenle</button>';
                    html += '<button onclick="deleteKullanici(' + k.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs">Sil</button>';
                    html += '</td></tr>';
                }
                if (kullanicilar.length === 0) {
                    html = '<tr><td colspan="6" class="text-center py-8 text-gray-500">Kullanıcı bulunamadı</td>';
                }
                document.getElementById('kullaniciListesi').innerHTML = html;
            } catch (e) {
                console.error('Kullanıcılar yüklenirken hata:', e);
                document.getElementById('kullaniciListesi').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">Veritabanı hatası</td>';
            }
        }

        window.editKullanici = async function(id, adsoyad, yetki, aktif) {
            const yeniAd = prompt('Yeni ad soyad:', adsoyad);
            if (!yeniAd) return;
            const yeniYetki = prompt('Yeni yetki (admin/user):', yetki);
            if (!yeniYetki || (yeniYetki !== 'admin' && yeniYetki !== 'user')) {
                alert('Yetki sadece admin veya user olabilir');
                return;
            }
            const yeniDurum = prompt('Durum (1=aktif, 0=pasif):', aktif);
            if (yeniDurum !== '0' && yeniDurum !== '1') {
                alert('Durum 1 veya 0 olmalıdır');
                return;
            }

            try {
                const res = await fetch('/api/kullanici/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        adsoyad: yeniAd,
                        yetki: yeniYetki,
                        aktif: parseInt(yeniDurum)
                    })
                });
                if (res.ok) {
                    alert('Kullanıcı güncellendi');
                    loadKullanicilar();
                } else {
                    alert('Güncelleme hatası');
                }
            } catch (e) {
                alert('Bağlantı hatası');
            }
        };

        window.deleteKullanici = async function(id) {
            if (confirm('Bu kullanıcıyı silmek istediğinize emin misiniz?')) {
                try {
                    const res = await fetch('/api/kullanici/' + id, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        alert('Kullanıcı silindi');
                        loadKullanicilar();
                    } else {
                        alert('Silme hatası');
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            }
        };

        const kullaniciEkleBtn = document.getElementById('kullaniciEkleBtn');
        if (kullaniciEkleBtn) {
            kullaniciEkleBtn.addEventListener('click', async function() {
                const email = document.getElementById('email').value;
                const sifre = document.getElementById('sifre').value;
                const adsoyad = document.getElementById('adsoyad').value;
                const yetki = document.getElementById('yetki').value;

                if (!email || !sifre || !adsoyad) {
                    alert('Tüm alanları doldurun');
                    return;
                }

                try {
                    const res = await fetch('/api/kullanici', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email,
                            sifre,
                            adsoyad,
                            yetki
                        })
                    });
                    if (res.ok) {
                        alert('Kullanıcı eklendi');
                        document.getElementById('email').value = '';
                        document.getElementById('sifre').value = '';
                        document.getElementById('adsoyad').value = '';
                        loadKullanicilar();
                    } else {
                        const err = await res.json();
                        alert('Hata: ' + err.hata);
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            });
        }

        const cikisBtn = document.getElementById('cikisBtn');
        if (cikisBtn) {
            cikisBtn.onclick = async function() {
                await fetch('/api/logout', {
                    method: 'POST'
                });
                window.location.href = '/';
            };
        }

        (async function() {
            try {
                const me = await fetch('/api/me');
                const user = await me.json();
                if (user.yetki !== 'admin') {
                    window.location.href = '/dashboard-viewer.html';
                    return;
                }
                loadKullanicilar();
            } catch (e) {
                console.error('Sayfa yüklenirken hata:', e);
            }
        })();
    </script>
</body>

</html>
