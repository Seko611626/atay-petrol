<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Logları | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f0f4f8;
        }
    </style>
</head>

<body class="min-h-screen">
    <nav class="bg-[#0A2F6C] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">📜 GİRİŞ LOGLARI</h1>
                <span class="text-xs bg-red-500/20 text-red-300 px-2 py-1 rounded-full">Admin Panel</span>
            </div>
            <div class="flex gap-2 flex-wrap">
                <a href="dashboard.html" class="px-3 py-2 rounded-lg hover:bg-white/10">🏠 Ana</a>
                <a href="borc.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="px-3 py-2 rounded-lg hover:bg-white/10">💵 Tahsilat</a>
                <a href="gider.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📉 Gider</a>
                <a href="kullanici.html" class="px-3 py-2 rounded-lg hover:bg-white/10">👥 Kullanıcılar</a>
                <a href="loglar.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="bg-white rounded-2xl shadow-md p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-[#0A2F6C]">🌐 Son Girişler (IP & Zaman)</h2>
                <div class="flex gap-2">
                    <input type="text" id="aramaInput" placeholder="🔍 Email veya IP ara..." class="border p-2 rounded-xl text-sm">
                    <input type="date" id="tarihFiltre" class="border p-2 rounded-xl text-sm">
                    <button onclick="refreshLogs()" class="bg-[#0A2F6C] text-white px-3 py-2 rounded-xl text-sm">🔄 Yenile</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">ID</th>
                            <th class="p-3 text-left">Email</th>
                            <th class="p-3 text-left">IP Adresi</th>
                            <th class="p-3 text-left">Giriş Zamanı</th>
                        </tr>
                    </thead>
                    <tbody id="logListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let tumLoglar = [];

        async function loadLoglar() {
            try {
                const res = await fetch('/api/loglar');
                tumLoglar = await res.json();
                filtreleVeGoster();
            } catch (e) {
                console.error('Loglar yüklenirken hata:', e);
                document.getElementById('logListesi').innerHTML = '<tr><td colspan="4" class="text-center py-8 text-red-500">Veritabanı hatası</td>';
            }
        }

        function filtreleVeGoster() {
            const aramaInput = document.getElementById('aramaInput');
            const arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            const tarihFiltre = document.getElementById('tarihFiltre') ? document.getElementById('tarihFiltre').value : '';

            let filtrelenmis = [];
            for (let i = 0; i < tumLoglar.length; i++) {
                const log = tumLoglar[i];
                const emailVar = log.email.toLowerCase().indexOf(arama) !== -1;
                const ipVar = log.ip.toLowerCase().indexOf(arama) !== -1;
                const uyuyor = emailVar || ipVar;
                const tarihUyuyor = tarihFiltre === '' || log.giris_zamani.substring(0, 10) === tarihFiltre;
                if (uyuyor && tarihUyuyor) {
                    filtrelenmis.push(log);
                }
            }

            let html = '';
            for (let i = 0; i < filtrelenmis.length; i++) {
                const log = filtrelenmis[i];
                const tarihObj = new Date(log.giris_zamani);
                const tarihStr = tarihObj.toLocaleDateString('tr-TR');
                const saatStr = tarihObj.toLocaleTimeString('tr-TR');
                let ipClass = '';
                if (log.ip === '::1' || log.ip === '127.0.0.1') ipClass = 'text-green-600 font-semibold';
                else if (log.ip.indexOf('192.168.') === 0) ipClass = 'text-blue-600';

                html += '<tr class="border-b hover:bg-gray-50">';
                html += '<td class="p-3">' + log.id + '</td>';
                html += '<td class="p-3 font-semibold">' + log.email + '</td>';
                html += '<td class="p-3 font-mono ' + ipClass + '">' + log.ip + '</td>';
                html += '<td class="p-3">' + tarihStr + ' ' + saatStr + '</td>';
                html += '</tr>';
            }
            if (filtrelenmis.length === 0) {
                html = '<tr><td colspan="4" class="text-center py-8 text-gray-500">Kayıt bulunamadı</td></tr>';
            }
            document.getElementById('logListesi').innerHTML = html;
        }

        window.refreshLogs = function() {
            loadLoglar();
            alert('Loglar yenilendi');
        };

        const aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        const tarihFiltre = document.getElementById('tarihFiltre');
        if (tarihFiltre) {
            tarihFiltre.addEventListener('change', filtreleVeGoster);
        }

        const cikisBtn = document.getElementById('cikisBtn');
        if (cikisBtn) {
            cikisBtn.onclick = async function() {
                await fetch('/api/logout', {
                    method: 'POST'
                });
                window.location.href = '/';
            };
        }

        (async function() {
            try {
                const me = await fetch('/api/me');
                const user = await me.json();
                if (user.yetki !== 'admin') {
                    window.location.href = '/dashboard-viewer.html';
                    return;
                }
                loadLoglar();
            } catch (e) {
                console.error('Sayfa yüklenirken hata:', e);
            }
        })();
    </script>
</body>

</html>
