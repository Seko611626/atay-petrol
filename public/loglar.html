<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Logları - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Giriş Logları</h2>
            <div class="nav-links">
                <a href="/admin.html">📊 Dashboard</a>
                <a href="/borc.html">💰 Borçlar</a>
                <a href="/tahsilat.html">💵 Tahsilat</a>
                <a href="/gider.html">📉 Giderler</a>
                <a href="/kullanici.html">👥 Kullanıcılar</a>
                <a href="/loglar.html">📜 Loglar</a>
                <a href="/rapor.html">📋 Rapor</a>
                <button onclick="logout()">🚪 Çıkış</button>
            </div>
        </div>

        <div class="table-container">
            <h3>📋 Giriş Logları</h3>
            <table id="logTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>E-posta</th>
                        <th>IP Adresi</th>
                        <th>Giriş Zamanı</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loglariYukle() {
            const res = await fetch('/api/loglar');
            const loglar = await res.json();
            const tbody = document.querySelector('#logTablosu tbody');
            tbody.innerHTML = '';
            loglar.forEach(l => {
                tbody.innerHTML += `<tr><td>${l.id}</td><td>${l.email}</td><td>${l.ip}</td><td>${l.zaman}</td></tr>`;
            });
        }

        async function logout() {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/index.html';
        }

        async function init() {
            const res = await fetch('/api/me');
            const user = await res.json();
            if (!user || user.rol !== 'admin') window.location.href = '/index.html';
            loglariYukle();
        }
        init();
    </script>
</body>

</html>
