<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atay Petrol | Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0A2F6C 0%, #1E4D8C 100%);
            min-height: 100vh;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 48px;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md p-8 login-card animate-scale">
        <div class="text-center mb-8">
            <div class="animate-float">
                <h1 class="text-5xl font-bold text-white">⛽ ATAY</h1>
                <p class="text-2xl font-semibold text-cyan-300">Petrol Satış Takip</p>
            </div>
            <p class="text-blue-200 mt-2">v5.0 Diamond</p>
        </div>

        <form id="loginForm">
            <div class="mb-5">
                <label class="block text-sm mb-2 text-white">📧 E-posta</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-2xl bg-white/20 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-cyan-400" placeholder="atay@gmail.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm mb-2 text-white">🔒 Şifre</label>
                <input type="password" id="sifre" class="w-full px-4 py-3 rounded-2xl bg-white/20 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-cyan-400" required>
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-2xl font-bold text-lg">GİRİŞ YAP →</button>
        </form>

        <div id="hata" class="text-red-300 text-center mt-4 text-sm"></div>
        <div class="mt-6 text-center text-xs text-blue-200">🔐 Tüm girişler IP ve zaman ile loglanır</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const sifre = document.getElementById('sifre').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Giriş yapılıyor...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        sifre
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.yetki === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/viewer.html';
                    }
                } else {
                    document.getElementById('hata').innerText = data.hata || 'Giriş başarısız';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                document.getElementById('hata').innerText = 'Bağlantı hatası';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
