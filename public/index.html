<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ATAY PETROL - Giriş</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>⛽ ATAY PETROL</h1>
            <div class="subtitle">Yönetim Sistemi</div>
            <input type="email" id="email" placeholder="E-posta" autocomplete="off">
            <input type="password" id="sifre" placeholder="Şifre">
            <button onclick="girisYap()">Giriş Yap</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        async function girisYap() {
            const email = document.getElementById('email').value;
            const sifre = document.getElementById('sifre').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!email || !sifre) {
                errorMsg.innerText = 'Lütfen e-posta ve şifre giriniz';
                return;
            }

            try {
                // IP adresini al (basitçe)
                let ip = 'bilinmiyor';
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    ip = ipData.ip;
                } catch (e) {}

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        sifre,
                        ip
                    })
                });

                const data = await response.json();

                if (data.success) {
                    if (data.rol === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/viewer.html';
                    }
                } else {
                    errorMsg.innerText = data.error || 'Giriş başarısız';
                }
            } catch (err) {
                errorMsg.innerText = 'Bağlantı hatası';
            }
        }

        document.getElementById('sifre').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') girisYap();
        });
    </script>
</body>

</html>
