<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Borç Takip | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            transition: all 0.3s ease;
        }
        
        .form-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 47, 108, 0.1);
        }
        
        .borc-card {
            transition: all 0.3s ease;
        }
        
        .borc-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="bg-gray-100">
    <nav class="navbar text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <div class="animate-float">
                    <h1 class="text-2xl font-bold">📝 BORÇ TAKİP SİSTEMİ</h1>
                </div>
            </div>
            <div class="space-x-2 flex flex-wrap gap-1">
                <a href="dashboard.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🏠 Ana</a>
                <a href="satis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💰 Satış</a>
                <a href="alis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🚛 Alış</a>
                <a href="gider.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📉 Gider</a>
                <a href="borc.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💵 Tahsilat</a>
                <a href="rapor.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📊 Rapor</a>
                <a href="kullanici.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition-all hover:scale-105">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 sm:p-6">
        <!-- Borç İstatistik Kartları -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
            <div class="bg-gradient-to-r from-red-50 to-rose-50 rounded-xl p-4 animate-fadeLeft borc-card">
                <p class="text-sm text-gray-500">📊 Toplam Borç</p>
                <p class="text-2xl font-bold text-red-600" id="toplamBorcGenel">0 ₺</p>
            </div>
            <div class="bg-gradient-to-r from-orange-50 to-amber-50 rounded-xl p-4 animate-fadeUp borc-card">
                <p class="text-sm text-gray-500">👥 Borçlu Sayısı</p>
                <p class="text-2xl font-bold text-orange-600" id="borcluSayisi">0</p>
            </div>
            <div class="bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl p-4 animate-fadeRight borc-card">
                <p class="text-sm text-gray-500">✅ Bugün Tahsilat</p>
                <p class="text-2xl font-bold text-green-600" id="bugunTahsilat">0 ₺</p>
            </div>
        </div>

        <!-- Borç Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-4 sm:p-6 mb-8 hidden border-t-4 border-red-500 form-card animate-scale">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-gradient-to-r from-red-500 to-rose-600 rounded-xl flex items-center justify-center">
                    <span class="text-white text-xl">➕</span>
                </div>
                <h2 class="text-xl font-bold text-red-600">Yeni Borç Ekle</h2>
            </div>
            <form id="borcForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📅 Tarih</label>
                    <input type="date" id="tarih" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">👤 Müşteri Adı</label>
                    <input type="text" id="musteri" placeholder="Müşteri Adı Soyadı" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📞 Telefon</label>
                    <input type="tel" id="musteri_tel" placeholder="Telefon Numarası" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">⛽ Ürün</label>
                    <select id="urun_id" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all" required>
                        <option value="">Seçiniz</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">💰 Borç Tutarı (TL)</label>
                    <input type="number" id="miktar" placeholder="Borç Tutarı" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all" step="any" required>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">📝 Açıklama</label>
                    <input type="text" id="aciklama" placeholder="Açıklama (Opsiyonel)" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="bg-red-600 text-white w-full py-3 rounded-xl font-bold text-lg flex items-center justify-center gap-2 hover:bg-red-700 transition-all">
                        <span>💾</span> Borç Kaydet
                    </button>
                </div>
            </form>
        </div>

        <!-- Borç Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 animate-fadeUp">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-xl font-bold gradient-text">📋 Borç Listesi</h2>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="text" id="aramaInput" placeholder="🔍 Müşteri ara..." class="border p-2 rounded-xl text-sm pl-8 w-48">
                        <span class="absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs">🔍</span>
                    </div>
                    <select id="filtreDurum" class="border p-2 rounded-xl text-sm">
                        <option value="">Tüm Borçlar</option>
                        <option value="odenmedi">Ödenmeyenler</option>
                        <option value="odendi">Ödenenler</option>
                    </select>
                    <button onclick="exportBorclarToExcel()" class="bg-green-500 text-white px-3 py-2 rounded-xl text-sm hover:bg-green-600 transition-all flex items-center gap-1">
                        📎 Excel
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <div id="borcListesi" class="min-w-[800px]"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        var yetki = '';
        var tumBorclar = [];

        async function loadUrunler() {
            var res = await fetch('/api/urunler');
            var urunler = await res.json();
            var select = document.getElementById('urun_id');
            var html = '<option value="">Seçiniz</option>';
            for (var i = 0; i < urunler.length; i++) {
                html += '<option value="' + urunler[i].id + '">' + urunler[i].ad + '</option>';
            }
            select.innerHTML = html;
        }

        async function loadBorclar() {
            var res = await fetch('/api/borc');
            tumBorclar = await res.json();
            filtreleVeGoster();
            istatistikleriGuncelle();
        }

        function istatistikleriGuncelle() {
            var toplam = 0;
            var borcluSet = {};
            var bugun = new Date().toISOString().slice(0, 10);

            for (var i = 0; i < tumBorclar.length; i++) {
                var b = tumBorclar[i];
                toplam += b.kalan_tl;
                if (b.kalan_tl > 0) {
                    borcluSet[b.musteri_adi] = true;
                }
            }

            document.getElementById('toplamBorcGenel').innerHTML = formatMoney(toplam);
            document.getElementById('borcluSayisi').innerHTML = Object.keys(borcluSet).length;

            // Bugünkü tahsilat
            (async function() {
                var tahsilatRes = await fetch('/api/tahsilat');
                var tahsilatlar = await tahsilatRes.json();
                var bugunTahsilat = 0;
                for (var i = 0; i < tahsilatlar.length; i++) {
                    if (tahsilatlar[i].tarih === bugun) {
                        bugunTahsilat += tahsilatlar[i].miktar;
                    }
                }
                document.getElementById('bugunTahsilat').innerHTML = formatMoney(bugunTahsilat);
            })();
        }

        function filtreleVeGoster() {
            var aramaInput = document.getElementById('aramaInput');
            var arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            var durumFiltre = document.getElementById('filtreDurum') ? document.getElementById('filtreDurum').value : '';

            var filtrelenmis = [];
            for (var i = 0; i < tumBorclar.length; i++) {
                var b = tumBorclar[i];
                var uyuyorMu = b.musteri_adi.toLowerCase().indexOf(arama) !== -1;

                var durumUyuyor = true;
                if (durumFiltre === 'odenmedi') {
                    durumUyuyor = b.kalan_tl > 0;
                } else if (durumFiltre === 'odendi') {
                    durumUyuyor = b.kalan_tl <= 0;
                }

                if (uyuyorMu && durumUyuyor) {
                    filtrelenmis.push(b);
                }
            }

            var toplamKalan = 0;
            for (var i = 0; i < filtrelenmis.length; i++) {
                toplamKalan += filtrelenmis[i].kalan_tl;
            }

            var html = '';
            html += '<div class="mb-3 p-2 bg-gray-100 rounded-lg flex justify-between items-center">';
            html += '<span class="text-sm font-semibold">📊 Toplam Kalan Borç: ' + formatMoney(toplamKalan) + '</span>';
            html += '<span class="text-sm text-gray-500">' + filtrelenmis.length + ' kayıt</span>';
            html += '</div>';
            html += '<table class="w-full"><thead><tr class="bg-gradient-to-r from-gray-100 to-gray-200">';
            html += '<th class="p-3 rounded-tl-xl text-left">Tarih</th>';
            html += '<th class="p-3 text-left">Müşteri</th>';
            html += '<th class="p-3 text-left">Telefon</th>';
            html += '<th class="p-3 text-left">Ürün</th>';
            html += '<th class="p-3 text-left">Borç</th>';
            html += '<th class="p-3 text-left">Kalan</th>';
            html += '<th class="p-3 text-left">Açıklama</th>';
            html += '<th class="p-3 text-left">Durum</th>';
            html += '<th class="p-3 rounded-tr-xl text-left">İşlemler</th>';
            html += '<tr></thead><tbody>';

            if (filtrelenmis.length === 0) {
                html += '<tr><td colspan="9" class="text-center py-8 text-gray-500">Borç bulunamadı</td></tr>';
            } else {
                for (var i = 0; i < filtrelenmis.length; i++) {
                    var b = filtrelenmis[i];
                    var durum = '';
                    var durumClass = '';

                    if (b.kalan_tl <= 0) {
                        durum = '✅ Ödendi';
                        durumClass = 'text-green-600';
                    } else {
                        durum = '⚠️ Bekliyor';
                        durumClass = 'text-red-600 font-bold';
                    }

                    html += '<tr class="table-row border-b hover:bg-gray-50">';
                    html += '<td class="p-3">' + formatDate(b.tarih) + '</td>';
                    html += '<td class="p-3 font-semibold">' + b.musteri_adi + '</td>';
                    html += '<td class="p-3">' + (b.musteri_tel || '-') + '</td>';
                    html += '<td class="p-3">' + b.urun_adi + '</td>';
                    html += '<td class="p-3">' + formatMoney(b.miktar_tl) + '</td>';
                    html += '<td class="p-3 font-bold text-red-600">' + formatMoney(b.kalan_tl) + '</td>';
                    html += '<td class="p-3">' + (b.aciklama || '-') + '</td>';
                    html += '<td class="p-3 ' + durumClass + '">' + durum + '</td>';
                    html += '<td class="p-3">';
                    if (yetki === 'admin') {
                        if (b.kalan_tl > 0) {
                            html += '<a href="tahsilat.html" class="bg-green-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-green-600 transition-all mr-1 inline-block">💰 Tahsilat</a>';
                        }
                        html += '<button onclick="editBorc(' + b.id + ')" class="bg-yellow-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-yellow-600 transition-all mr-1">✏️ Düzenle</button>';
                        html += '<button onclick="deleteBorc(' + b.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-red-600 transition-all">🗑️ Sil</button>';
                    } else {
                        html += '-';
                    }
                    html += '</td></tr>';
                }
            }
            html += '</tbody>}</div>';
            document.getElementById('borcListesi').innerHTML = html;
        }

        window.editBorc = async function(id) {
            var borc = null;
            for (var i = 0; i < tumBorclar.length; i++) {
                if (tumBorclar[i].id === id) {
                    borc = tumBorclar[i];
                    break;
                }
            }
            if (!borc) return;
            var yeniMiktar = prompt('Yeni borç miktarı:', borc.miktar_tl);
            if (yeniMiktar) {
                var res = await fetch('/api/borc/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        musteri_adi: borc.musteri_adi,
                        musteri_tel: borc.musteri_tel,
                        urun_id: borc.urun_id,
                        miktar_tl: parseFloat(yeniMiktar),
                        aciklama: borc.aciklama
                    })
                });
                if (res.ok) {
                    showToast('✅ Borç güncellendi', 'success');
                    loadBorclar();
                } else {
                    showToast('❌ Güncelleme hatası', 'error');
                }
            }
        };

        window.deleteBorc = async function(id) {
            if (confirm('Bu borç kaydını silmek istediğinize emin misiniz?')) {
                var res = await fetch('/api/borc/' + id, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    showToast('✅ Borç silindi', 'success');
                    loadBorclar();
                } else {
                    showToast('❌ Silme hatası', 'error');
                }
            }
        };

        window.exportBorclarToExcel = function() {
            if (tumBorclar.length === 0) {
                showToast('Veri yok', 'warning');
                return;
            }
            var exportData = [];
            for (var i = 0; i < tumBorclar.length; i++) {
                var b = tumBorclar[i];
                exportData.push({
                    Tarih: b.tarih,
                    Musteri: b.musteri_adi,
                    Telefon: b.musteri_tel || '-',
                    Urun: b.urun_adi,
                    BorcTutari: b.miktar_tl,
                    KalanBorc: b.kalan_tl,
                    Aciklama: b.aciklama || '-'
                });
            }
            exportToExcel(exportData, 'borclar');
        };

        var borcForm = document.getElementById('borcForm');
        if (borcForm) {
            borcForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                var data = {
                    tarih: document.getElementById('tarih').value,
                    musteri_adi: document.getElementById('musteri').value,
                    musteri_tel: document.getElementById('musteri_tel').value,
                    urun_id: parseInt(document.getElementById('urun_id').value),
                    miktar_tl: parseFloat(document.getElementById('miktar').value),
                    aciklama: document.getElementById('aciklama').value
                };

                var res = await fetch('/api/borc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast('✅ Borç başarıyla eklendi', 'success');
                    loadBorclar();
                    borcForm.reset();
                    setTodayDate('tarih');
                } else {
                    var err = await res.json();
                    showToast('❌ ' + (err.hata || 'Yetkiniz yok'), 'error');
                }
            });
        }

        var aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        var filtreDurum = document.getElementById('filtreDurum');
        if (filtreDurum) {
            filtreDurum.addEventListener('change', filtreleVeGoster);
        }

        (async function() {
            var me = await fetch('/api/me');
            var user = await me.json();
            yetki = user.yetki;

            if (yetki === 'admin') {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.classList.remove('hidden');
                setTodayDate('tarih');
            } else {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.remove();
                var adminElements = document.querySelectorAll('.admin-only');
                for (var i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) adminElements[i].style.display = 'none';
                }
            }

            await loadUrunler();
            await loadBorclar();
        })();
    </script>
</body>

</html>
