<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borçlar | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: #f0f4f8;
        }
        
        .btn-primary {
            background: #0A2F6C;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            background: #1E4D8C;
        }
        
        .admin-only {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen">
    <nav class="bg-[#0A2F6C] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-bold">📝 BORÇ TAKİP SİSTEMİ</h1>
            </div>
            <div class="flex gap-2 flex-wrap">
                <a href="dashboard.html" class="px-3 py-2 rounded-lg hover:bg-white/10">🏠 Ana</a>
                <a href="borc.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="px-3 py-2 rounded-lg hover:bg-white/10">💵 Tahsilat</a>
                <a href="gider.html" class="px-3 py-2 rounded-lg hover:bg-white/10">📉 Gider</a>
                <a href="kullanici.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="px-3 py-2 rounded-lg hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <!-- Borç Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-6 mb-6 hidden">
            <h2 class="text-xl font-bold mb-4 text-[#0A2F6C]">➕ Yeni Borç Ekle</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="date" id="tarih" class="border p-3 rounded-xl">
                <input type="text" id="musteri" placeholder="Müşteri Adı" class="border p-3 rounded-xl">
                <input type="number" id="miktar" placeholder="Borç Tutarı (TL)" class="border p-3 rounded-xl" step="any">
                <input type="text" id="aciklama" placeholder="Açıklama" class="border p-3 rounded-xl">
                <button id="borcEkleBtn" class="btn-primary text-white p-3 rounded-xl font-semibold col-span-1 md:col-span-4">Borç Ekle</button>
            </div>
        </div>

        <!-- Borç Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-6">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <h2 class="text-xl font-bold text-[#0A2F6C]">📋 Borç Listesi</h2>
                <div class="flex gap-2">
                    <input type="text" id="aramaInput" placeholder="🔍 Müşteri ara..." class="border p-2 rounded-xl text-sm">
                    <select id="filtreDurum" class="border p-2 rounded-xl text-sm">
                        <option value="">Tümü</option>
                        <option value="odenmedi">Ödenmeyenler</option>
                        <option value="odendi">Ödenenler</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-3 text-left">Tarih</th>
                            <th class="p-3 text-left">Müşteri</th>
                            <th class="p-3 text-left">Borç</th>
                            <th class="p-3 text-left">Kalan</th>
                            <th class="p-3 text-left">Açıklama</th>
                            <th class="p-3 text-left">Durum</th>
                            <th class="p-3 text-left">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="borcListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let yetki = '';
        let tumBorclar = [];

        async function loadBorclar() {
            try {
                const res = await fetch('/api/borc');
                tumBorclar = await res.json();
                filtreleVeGoster();
            } catch (e) {
                console.error('Borçlar yüklenirken hata:', e);
                document.getElementById('borcListesi').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Veritabanı hatası</td></tr>';
            }
        }

        function filtreleVeGoster() {
            const aramaInput = document.getElementById('aramaInput');
            const arama = aramaInput ? aramaInput.value.toLowerCase() : '';
            const durumSelect = document.getElementById('filtreDurum');
            const durumFiltre = durumSelect ? durumSelect.value : '';

            let filtrelenmis = [];
            for (let i = 0; i < tumBorclar.length; i++) {
                const b = tumBorclar[i];
                const uyuyor = b.musteri_adi.toLowerCase().indexOf(arama) !== -1;
                let durumUyuyor = true;
                if (durumFiltre === 'odenmedi') durumUyuyor = b.kalan_tl > 0;
                if (durumFiltre === 'odendi') durumUyuyor = b.kalan_tl <= 0;
                if (uyuyor && durumUyuyor) {
                    filtrelenmis.push(b);
                }
            }

            let html = '';
            for (let i = 0; i < filtrelenmis.length; i++) {
                const b = filtrelenmis[i];
                const durum = b.kalan_tl <= 0 ? '✅ Ödendi' : '⚠️ Bekliyor';
                const durumClass = b.kalan_tl <= 0 ? 'text-green-600' : 'text-red-600 font-bold';
                html += '<tr class="border-b hover:bg-gray-50">';
                html += '<td class="p-3">' + b.tarih + '</td>';
                html += '<td class="p-3 font-semibold">' + b.musteri_adi + '</td>';
                html += '<td class="p-3">' + formatMoney(b.miktar_tl) + '</td>';
                html += '<td class="p-3 font-bold text-red-600">' + formatMoney(b.kalan_tl) + '</td>';
                html += '<td class="p-3">' + (b.aciklama || '-') + '</td>';
                html += '<td class="p-3 ' + durumClass + '">' + durum + '</td>';
                html += '<td class="p-3">';
                if (yetki === 'admin') {
                    if (b.kalan_tl > 0) {
                        html += '<a href="tahsilat.html" class="bg-green-500 text-white px-2 py-1 rounded-lg text-xs inline-block mr-1">Tahsilat</a>';
                    }
                    html += '<button onclick="editBorc(' + b.id + ')" class="bg-yellow-500 text-white px-2 py-1 rounded-lg text-xs mr-1">Düzenle</button>';
                    html += '<button onclick="deleteBorc(' + b.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs">Sil</button>';
                } else {
                    html += '-';
                }
                html += '</td></tr>';
            }
            if (filtrelenmis.length === 0) {
                html = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Borç bulunamadı</td></tr>';
            }
            document.getElementById('borcListesi').innerHTML = html;
        }

        window.editBorc = async function(id) {
            let borc = null;
            for (let i = 0; i < tumBorclar.length; i++) {
                if (tumBorclar[i].id === id) {
                    borc = tumBorclar[i];
                    break;
                }
            }
            if (!borc) return;

            const yeniMiktar = prompt('Yeni borç miktarı:', borc.miktar_tl);
            if (yeniMiktar && !isNaN(yeniMiktar)) {
                try {
                    const res = await fetch('/api/borc/' + id, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            musteri_adi: borc.musteri_adi,
                            miktar_tl: parseFloat(yeniMiktar),
                            aciklama: borc.aciklama
                        })
                    });
                    if (res.ok) {
                        alert('Borç güncellendi');
                        loadBorclar();
                    } else {
                        alert('Güncelleme hatası');
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            }
        };

        window.deleteBorc = async function(id) {
            if (confirm('Bu borcu silmek istediğinize emin misiniz?')) {
                try {
                    const res = await fetch('/api/borc/' + id, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        alert('Borç silindi');
                        loadBorclar();
                    } else {
                        alert('Silme hatası');
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            }
        };

        const borcEkleBtn = document.getElementById('borcEkleBtn');
        if (borcEkleBtn) {
            borcEkleBtn.addEventListener('click', async function() {
                const tarih = document.getElementById('tarih').value;
                const musteri = document.getElementById('musteri').value;
                const miktar = parseFloat(document.getElementById('miktar').value);
                const aciklama = document.getElementById('aciklama').value;

                if (!tarih || !musteri || !miktar) {
                    alert('Tarih, müşteri adı ve borç tutarı giriniz');
                    return;
                }

                try {
                    const res = await fetch('/api/borc', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            tarih,
                            musteri_adi: musteri,
                            miktar_tl: miktar,
                            aciklama: aciklama || ''
                        })
                    });
                    if (res.ok) {
                        alert('Borç eklendi');
                        document.getElementById('tarih').value = new Date().toISOString().slice(0, 10);
                        document.getElementById('musteri').value = '';
                        document.getElementById('miktar').value = '';
                        document.getElementById('aciklama').value = '';
                        loadBorclar();
                    } else {
                        const err = await res.json();
                        alert('Hata: ' + (err.hata || 'Bilinmeyen hata'));
                    }
                } catch (e) {
                    alert('Bağlantı hatası');
                }
            });
        }

        const aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }
        const durumSelect = document.getElementById('filtreDurum');
        if (durumSelect) {
            durumSelect.addEventListener('change', filtreleVeGoster);
        }

        const cikisBtn = document.getElementById('cikisBtn');
        if (cikisBtn) {
            cikisBtn.onclick = async function() {
                await fetch('/api/logout', {
                    method: 'POST'
                });
                window.location.href = '/';
            };
        }

        function formatMoney(amount) {
            if (amount === undefined || amount === null) amount = 0;
            return amount.toLocaleString('tr-TR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }) + ' ₺';
        }

        (async function() {
            try {
                const me = await fetch('/api/me');
                const user = await me.json();
                yetki = user.yetki;

                const adminForm = document.getElementById('adminForm');
                if (adminForm) {
                    if (yetki === 'admin') {
                        adminForm.classList.remove('hidden');
                    } else {
                        adminForm.classList.add('hidden');
                    }
                }

                const adminElements = document.querySelectorAll('.admin-only');
                for (let i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) {
                        if (yetki === 'admin') {
                            adminElements[i].style.display = '';
                        } else {
                            adminElements[i].style.display = 'none';
                        }
                    }
                }

                const tarihInput = document.getElementById('tarih');
                if (tarihInput) {
                    tarihInput.value = new Date().toISOString().slice(0, 10);
                }

                await loadBorclar();
            } catch (e) {
                console.error('Sayfa yüklenirken hata:', e);
            }
        })();
    </script>
</body>

</html>
