<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borç Yönetimi - ATAY PETROL</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="navbar">
            <h2>⛽ ATAY PETROL - Borç Yönetimi</h2>
            <div class="nav-links" id="navLinks"></div>
        </div>

        <!-- SADECE ADMIN GÖRECEK -->
        <div id="adminForm" class="form-card" style="display:none;">
            <h3>➕ Yeni Borç Ekle</h3>
            <div class="form-group">
                <label>Müşteri Adı</label>
                <input type="text" id="musteri" placeholder="Müşteri adı" class="form-control">
            </div>
            <div class="form-group">
                <label>Ürün</label>
                <select id="urun" class="form-control">
                    <option value="Motorin">Motorin</option>
                    <option value="Benzin">Benzin</option>
                    <option value="LPG">LPG</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tutar (₺)</label>
                <input type="number" id="tutar" step="0.01" placeholder="Tutar" class="form-control">
            </div>
            <div class="form-group">
                <label>Açıklama</label>
                <textarea id="aciklama" rows="2" placeholder="Açıklama" class="form-control"></textarea>
            </div>
            <div class="form-group">
                <label>Tarih</label>
                <input type="date" id="tarih" class="form-control">
            </div>
            <button class="btn-primary" onclick="borcEkle()">Borç Ekle</button>
        </div>

        <!-- TARİH FİLTRE -->
        <div class="tarih-bar">
            <label>📅 Filtrele:</label>
            <input type="date" id="filtreTarih">
            <button class="btn-primary" onclick="borclariYukle()">Filtrele</button>
            <button class="btn-primary" onclick="tumBorclariGoster()">Tümü</button>
        </div>

        <!-- BORÇ LİSTESİ -->
        <div class="table-container">
            <h3>📋 Borç Listesi</h3>
            <table id="borcTablosu">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Müşteri</th>
                        <th>Ürün</th>
                        <th>Tutar</th>
                        <th>Kalan</th>
                        <th>Açıklama</th>
                        <th>Tarih</th>
                        <th id="silBaslik" style="display:none;">İşlem</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let currentFilter = 'all'; // 'all' veya 'tarih'

        async function checkAuthAndRole() {
            try {
                const res = await fetch('/api/me');
                const user = await res.json();

                if (!user || user.error) {
                    window.location.href = '/index.html';
                    return;
                }

                isAdmin = user.rol === 'admin';

                // Navbar'ı doldur
                const navLinks = document.getElementById('navLinks');
                if (isAdmin) {
                    navLinks.innerHTML = `
                        <a href="/admin.html">📊 Dashboard</a>
                        <a href="/borc.html">💰 Borçlar</a>
                        <a href="/tahsilat.html">💵 Tahsilat</a>
                        <a href="/gider.html">📉 Giderler</a>
                        <a href="/kullanici.html">👥 Kullanıcılar</a>
                        <a href="/loglar.html">📜 Loglar</a>
                        <a href="/rapor.html">📋 Rapor</a>
                        <button onclick="logout()">🚪 Çıkış</button>
                    `;
                    // Admin formunu göster
                    document.getElementById('adminForm').style.display = 'block';
                    // Silme sütununu göster
                    document.getElementById('silBaslik').style.display = 'table-cell';
                } else {
                    navLinks.innerHTML = `
                        <a href="/viewer.html">📊 Dashboard</a>
                        <a href="/borc.html?viewer=1">💰 Borçlar</a>
                        <a href="/tahsilat.html?viewer=1">💵 Tahsilat</a>
                        <a href="/gider.html?viewer=1">📉 Giderler</a>
                        <a href="/rapor.html?viewer=1">📋 Rapor</a>
                        <button onclick="logout()">🚪 Çıkış</button>
                    `;
                    // Admin formunu gizle
                    document.getElementById('adminForm').style.display = 'none';
                    // Silme sütununu gizle
                    document.getElementById('silBaslik').style.display = 'none';
                }

                // Tarih input'u bugünü göstersin
                document.getElementById('tarih').value = new Date().toISOString().split('T')[0];
                document.getElementById('filtreTarih').value = new Date().toISOString().split('T')[0];

                // Borçları yükle
                await borclariYukle();
            } catch (err) {
                console.error('Auth hatası:', err);
                window.location.href = '/index.html';
            }
        }

        async function borclariYukle() {
            try {
                let url = '/api/borc';

                // Filtre varsa ekle
                const filterDate = document.getElementById('filtreTarih').value;
                if (currentFilter === 'tarih' && filterDate) {
                    url = `/api/borc?tarih=${filterDate}`;
                }

                const res = await fetch(url);
                const borclar = await res.json();

                const tbody = document.querySelector('#borcTablosu tbody');
                tbody.innerHTML = '';

                if (borclar.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Henüz borç kaydı yok</td></tr>';
                    return;
                }

                borclar.forEach(b => {
                    const row = tbody.insertRow();

                    row.insertCell(0).innerHTML = b.id;
                    row.insertCell(1).innerHTML = b.musteri;
                    row.insertCell(2).innerHTML = b.urun;
                    row.insertCell(3).innerHTML = formatMoney(b.tutar);
                    row.insertCell(4).innerHTML = formatMoney(b.kalan);
                    row.insertCell(5).innerHTML = b.aciklama || '-';
                    row.insertCell(6).innerHTML = b.tarih;

                    // Silme butonu (sadece admin için)
                    if (isAdmin) {
                        const silCell = row.insertCell(7);
                        silCell.innerHTML = `<button class="btn-danger" onclick="borcSil(${b.id})">🗑️ Sil</button>`;
                    }
                });
            } catch (err) {
                console.error('Borç yükleme hatası:', err);
                alert('Borçlar yüklenirken hata oluştu');
            }
        }

        async function borcEkle() {
            if (!isAdmin) {
                alert('Bu işlem için admin yetkisi gerekli!');
                return;
            }

            const musteri = document.getElementById('musteri').value.trim();
            const urun = document.getElementById('urun').value;
            const tutar = parseFloat(document.getElementById('tutar').value);
            const aciklama = document.getElementById('aciklama').value.trim();
            const tarih = document.getElementById('tarih').value;

            if (!musteri) {
                alert('Müşteri adı giriniz');
                return;
            }

            if (!tutar || tutar <= 0) {
                alert('Geçerli bir tutar giriniz');
                return;
            }

            try {
                const response = await fetch('/api/borc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        musteri,
                        urun,
                        tutar,
                        aciklama,
                        tarih
                    })
                });

                if (response.ok) {
                    alert('Borç başarıyla eklendi');
                    document.getElementById('musteri').value = '';
                    document.getElementById('tutar').value = '';
                    document.getElementById('aciklama').value = '';
                    await borclariYukle();
                } else {
                    const error = await response.json();
                    alert('Hata: ' + (error.error || 'Borç eklenemedi'));
                }
            } catch (err) {
                console.error('Borç ekleme hatası:', err);
                alert('Bağlantı hatası');
            }
        }

        async function borcSil(id) {
            if (!isAdmin) {
                alert('Bu işlem için admin yetkisi gerekli!');
                return;
            }

            if (confirm('Bu borcu silmek istediğinize emin misiniz?')) {
                try {
                    const response = await fetch(`/api/borc/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Borç silindi');
                        await borclariYukle();
                    } else {
                        alert('Silme işlemi başarısız');
                    }
                } catch (err) {
                    console.error('Silme hatası:', err);
                    alert('Bağlantı hatası');
                }
            }
        }

        function tumBorclariGoster() {
            currentFilter = 'all';
            document.getElementById('filtreTarih').value = '';
            borclariYukle();
        }

        function tariheGoreFiltrele() {
            currentFilter = 'tarih';
            borclariYukle();
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', {
                style: 'currency',
                currency: 'TRY',
                minimumFractionDigits: 2
            }).format(amount);
        }

        async function logout() {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/index.html';
        }

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndRole();

            // Filtre tarih değişince otomatik filtrele
            document.getElementById('filtreTarih').addEventListener('change', () => {
                if (document.getElementById('filtreTarih').value) {
                    currentFilter = 'tarih';
                    borclariYukle();
                }
            });
        });
    </script>
</body>

</html>
