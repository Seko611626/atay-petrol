<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzleyici | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            font-family: system-ui;
        }
        
        body {
            background: #f0f4f8;
        }
        
        .navbar {
            background: #0A2F6C;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .navbar button {
            background: #dc2626;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid;
        }
        
        .stat-card-1 {
            border-left-color: #10B981;
        }
        
        .stat-card-2 {
            border-left-color: #3B82F6;
        }
        
        .stat-card-3 {
            border-left-color: #8B5CF6;
        }
        
        .stat-card-4 {
            border-left-color: #EF4444;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .table-container {
            background: white;
            border-radius: 16px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 10px;
            background: #f8fafc;
        }
        
        td {
            padding: 8px 10px;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">⛽</span>
            <span style="font-weight: 800;">ATA Y PETROL</span>
            <span style="background: #3B82F620; padding: 2px 10px; border-radius: 40px; font-size: 11px;">İzleyici</span>
        </div>
        <button id="cikisBtn">🚪 Çıkış</button>
    </div>

    <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        <div class="stats-grid">
            <div class="stat-card stat-card-1">
                <div style="font-size: 13px;">🚛 Bugünkü Alış</div>
                <div style="font-size: 28px; font-weight: 800;" id="toplamAlis">0 ₺</div>
            </div>
            <div class="stat-card stat-card-2">
                <div style="font-size: 13px;">💰 Bugünkü Satış</div>
                <div style="font-size: 28px; font-weight: 800;" id="toplamSatis">0 ₺</div>
            </div>
            <div class="stat-card stat-card-3">
                <div style="font-size: 13px;">📈 Bugünkü Kar</div>
                <div style="font-size: 28px; font-weight: 800;" id="toplamKar">0 ₺</div>
            </div>
            <div class="stat-card stat-card-4">
                <div style="font-size: 13px;">💵 Gelen Toplam</div>
                <div style="font-size: 28px; font-weight: 800;" id="toplamTahsilat">0 ₺</div>
            </div>
        </div>

        <div class="table-container">
            <div style="font-weight: 700; margin-bottom: 12px;">📊 Ödeme Dağılımı</div><canvas id="odemeChart" height="200"></canvas></div>

        <div class="table-container">
            <div style="font-weight: 700; margin-bottom: 12px;">📋 Satış Listesi</div>
            <div style="max-height: 300px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Saat</th>
                            <th>Ürün</th>
                            <th>Litre</th>
                            <th>Alış</th>
                            <th>Satış</th>
                            <th>Kar</th>
                        </tr>
                    </thead>
                    <tbody id="satisListesi"></tbody>
                </table>
            </div>
        </div>

        <div class="table-container">
            <div style="font-weight: 700; margin-bottom: 12px;">📋 Borç Listesi</div>
            <div style="max-height: 300px; overflow-y: auto;">
                </table>
                <thead>
                    <tr>
                        <th>Tarih</th>
                        <th>Müşteri</th>
                        <th>Borç</th>
                        <th>Kalan</th>
                    </tr>
                </thead>
                <tbody id="borcListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let odemeChart;

        function formatMoney(amount) {
            return (amount || 0).toLocaleString('tr-TR', {
                minimumFractionDigits: 2
            }) + ' ₺';
        }

        function formatLiter(litre) {
            return (litre || 0).toLocaleString('tr-TR', {
                minimumFractionDigits: 2
            }) + ' L';
        }

        async function loadDashboard() {
            let tarih = new Date().toISOString().slice(0, 10);
            const res = await fetch(`/api/istatistik?tarih=${tarih}`);
            const data = await res.json();
            document.getElementById('toplamAlis').innerHTML = formatMoney(data.toplamAlis);
            document.getElementById('toplamSatis').innerHTML = formatMoney(data.toplamSatis);
            document.getElementById('toplamKar').innerHTML = formatMoney(data.toplamKar);
            document.getElementById('toplamTahsilat').innerHTML = formatMoney(data.toplamTahsilat);
        }

        async function loadSatis() {
            let tarih = new Date().toISOString().slice(0, 10);
            const res = await fetch(`/api/satis/tarih?tarih=${tarih}`);
            const satislar = await res.json();
            let html = '';
            for (let s of satislar) html += `<tr><td class="p-2">${s.saat||'-'}</td><td class="p-2">${s.urun_adi}</td><td class="p-2">${formatLiter(s.litre)}</td><td class="p-2">${formatMoney(s.alis_fiyat)}</td><td class="p-2">${formatMoney(s.satis_fiyat)}</td><td class="p-2 text-green-600">${formatMoney(s.kar)}</td></tr>`;
            if (!satislar.length) html = '<tr><td colspan="6" class="text-center">Satış yok</td></tr>';
            document.getElementById('satisListesi').innerHTML = html;
        }

        async function loadBorclar() {
            let tarih = new Date().toISOString().slice(0, 10);
            const res = await fetch(`/api/borc/tarih?tarih=${tarih}`);
            const borclar = await res.json();
            let html = '';
            for (let b of borclar) html += `<tr><td class="p-2">${b.tarih}</td><td class="p-2">${b.musteri_adi}</td><td class="p-2">${formatMoney(b.miktar_tl)}</td><td class="p-2 text-red-600">${formatMoney(b.kalan_tl)}</td></tr>`;
            if (!borclar.length) html = '<tr><td colspan="4" class="text-center">Borç yok</td></tr>';
            document.getElementById('borcListesi').innerHTML = html;
        }

        async function loadOdemeChart() {
            const res = await fetch('/api/odeme-rapor');
            const data = await res.json();
            const od = data[0] || {
                nakit: 0,
                havale: 0,
                pos: 0,
                borc: 0
            };
            if (odemeChart) odemeChart.destroy();
            odemeChart = new Chart(document.getElementById('odemeChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Nakit', 'Havale', 'POS', 'Borç'],
                    datasets: [{
                        data: [od.nakit, od.havale, od.pos, od.borc],
                        backgroundColor: ['#10B981', '#3B82F6', '#8B5CF6', '#EF4444'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        document.getElementById('cikisBtn').onclick = async() => {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/';
        };
        loadDashboard();
        loadSatis();
        loadBorclar();
        loadOdemeChart();
    </script>
</body>

</html>
