<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alış İşlemleri | Atay Petrol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            transition: all 0.3s ease;
        }
        
        .form-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 47, 108, 0.1);
        }
    </style>
</head>

<body class="bg-gray-100">
    <nav class="navbar text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
            <div class="flex items-center gap-3">
                <div class="animate-float">
                    <h1 class="text-2xl font-bold">🚛 ALIŞ İŞLEMLERİ</h1>
                </div>
            </div>
            <div class="space-x-2 flex flex-wrap gap-1">
                <a href="dashboard.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🏠 Ana</a>
                <a href="satis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💰 Satış</a>
                <a href="alis.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">🚛 Alış</a>
                <a href="gider.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📉 Gider</a>
                <a href="borc.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📝 Borçlar</a>
                <a href="tahsilat.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">💵 Tahsilat</a>
                <a href="rapor.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10">📊 Rapor</a>
                <a href="kullanici.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">👥 Kullanıcılar</a>
                <a href="loglar.html" class="hover:text-cyan-300 px-3 py-2 rounded-lg transition-all hover:bg-white/10 admin-only">📜 Loglar</a>
                <button id="cikisBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-700 transition-all hover:scale-105">🚪 Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 sm:p-6">
        <!-- Alış Ekleme Formu (Sadece Admin) -->
        <div id="adminForm" class="bg-white rounded-2xl shadow-md p-4 sm:p-6 mb-8 border-t-4 border-[#0A2F6C] form-card animate-scale">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-gradient-to-r from-[#0A2F6C] to-[#1E4D8C] rounded-xl flex items-center justify-center">
                    <span class="text-white text-xl">➕</span>
                </div>
                <h2 class="text-xl font-bold gradient-text">Yeni Alış (Stok Girişi)</h2>
            </div>
            <form id="alisForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📅 Tarih</label>
                    <input type="date" id="tarih" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0A2F6C] transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">⛽ Ürün</label>
                    <select id="urun_id" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0A2F6C] transition-all" required>
                        <option value="">Seçiniz</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">📏 Litre</label>
                    <input type="number" id="litre" placeholder="Litre" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0A2F6C] transition-all" step="any" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">💵 Alış Fiyatı (TL/L)</label>
                    <input type="number" id="birim_fiyat" placeholder="Alış Fiyatı" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0A2F6C] transition-all" step="any" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">🏭 Tedarikçi</label>
                    <input type="text" id="tedarikci" placeholder="Tedarikçi Adı" class="w-full border p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#0A2F6C] transition-all">
                </div>
                <div class="md:col-span-2 lg:col-span-3">
                    <button type="submit" class="btn-primary w-full py-3 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                        <span>💾</span> Alış Kaydet
                    </button>
                </div>
            </form>
        </div>

        <!-- Alış Listesi -->
        <div class="bg-white rounded-2xl shadow-md p-4 sm:p-6 animate-fadeUp">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-xl font-bold gradient-text">📋 Alış Geçmişi</h2>
                <div class="flex flex-wrap gap-2">
                    <div class="relative">
                        <input type="text" id="aramaInput" placeholder="🔍 Tedarikçi veya ürün ara..." class="border p-2 rounded-xl text-sm pl-8 w-48">
                        <span class="absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs">🔍</span>
                    </div>
                    <button onclick="exportAlisToExcel()" class="bg-green-500 text-white px-3 py-2 rounded-xl text-sm hover:bg-green-600 transition-all flex items-center gap-1">
                        📎 Excel
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <div id="alisListesi" class="min-w-[800px]"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        var yetki = '';
        var tumAlislar = [];

        async function loadUrunler() {
            var res = await fetch('/api/urunler');
            var urunler = await res.json();
            var select = document.getElementById('urun_id');
            var html = '<option value="">Seçiniz</option>';
            for (var i = 0; i < urunler.length; i++) {
                html += '<option value="' + urunler[i].id + '">' + urunler[i].ad + '</option>';
            }
            select.innerHTML = html;
        }

        async function loadAlis() {
            var res = await fetch('/api/alis');
            tumAlislar = await res.json();
            filtreleVeGoster();
        }

        function filtreleVeGoster() {
            var aramaInput = document.getElementById('aramaInput');
            var arama = aramaInput ? aramaInput.value.toLowerCase() : '';

            var filtrelenmis = [];
            for (var i = 0; i < tumAlislar.length; i++) {
                var a = tumAlislar[i];
                var tedarikciVar = a.tedarikci && a.tedarikci.toLowerCase().indexOf(arama) !== -1;
                var urunVar = a.urun_adi.toLowerCase().indexOf(arama) !== -1;
                if (tedarikciVar || urunVar) {
                    filtrelenmis.push(a);
                }
            }

            var toplamTutar = 0;
            for (var i = 0; i < filtrelenmis.length; i++) {
                toplamTutar += filtrelenmis[i].toplam_tutar;
            }

            var html = '';
            html += '<div class="mb-3 p-2 bg-gray-100 rounded-lg flex justify-between items-center">';
            html += '<span class="text-sm font-semibold">📊 Toplam Alış: ' + formatMoney(toplamTutar) + '</span>';
            html += '<span class="text-sm text-gray-500">' + filtrelenmis.length + ' kayıt</span>';
            html += '</div>';
            html += '<table class="w-full"><thead><tr class="bg-gradient-to-r from-gray-100 to-gray-200">';
            html += '<th class="p-3 rounded-tl-xl text-left">Tarih</th>';
            html += '<th class="p-3 text-left">Ürün</th>';
            html += '<th class="p-3 text-left">Litre</th>';
            html += '<th class="p-3 text-left">Alış Fiyatı</th>';
            html += '<th class="p-3 text-left">Tedarikçi</th>';
            html += '<th class="p-3 text-left">Toplam</th>';
            html += '<th class="p-3 rounded-tr-xl text-left">İşlemler</th>';
            html += '</tr></thead><tbody>';

            if (filtrelenmis.length === 0) {
                html += '<tr><td colspan="7" class="text-center py-8 text-gray-500">Alış kaydı bulunamadı</td></tr>';
            } else {
                for (var i = 0; i < filtrelenmis.length; i++) {
                    var a = filtrelenmis[i];
                    html += '<tr class="table-row border-b hover:bg-gray-50">';
                    html += '<td class="p-3">' + formatDate(a.tarih) + '</td>';
                    html += '<td class="p-3 font-semibold">' + a.urun_adi + '</td>';
                    html += '<td class="p-3">' + formatLiter(a.litre) + '</td>';
                    html += '<td class="p-3">' + formatMoney(a.birim_fiyat) + '</td>';
                    html += '<td class="p-3">' + (a.tedarikci || '-') + '</td>';
                    html += '<td class="p-3 font-bold text-purple-600">' + formatMoney(a.toplam_tutar) + '</td>';
                    html += '<td class="p-3">';
                    if (yetki === 'admin') {
                        html += '<button onclick="editAlis(' + a.id + ')" class="bg-yellow-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-yellow-600 transition-all mr-1">✏️ Düzenle</button>';
                        html += '<button onclick="deleteAlis(' + a.id + ')" class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs hover:bg-red-600 transition-all">🗑️ Sil</button>';
                    } else {
                        html += '-';
                    }
                    html += '</td></tr>';
                }
            }
            html += '</tbody></table>';
            document.getElementById('alisListesi').innerHTML = html;
        }

        window.editAlis = async function(id) {
            var alis = null;
            for (var i = 0; i < tumAlislar.length; i++) {
                if (tumAlislar[i].id === id) {
                    alis = tumAlislar[i];
                    break;
                }
            }
            if (!alis) return;

            var yeniLitre = prompt('Yeni litre:', alis.litre);
            var yeniFiyat = prompt('Yeni alış fiyatı:', alis.birim_fiyat);
            var yeniTedarikci = prompt('Tedarikçi:', alis.tedarikci || '');

            if (yeniLitre && yeniFiyat) {
                var res = await fetch('/api/alis/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tarih: alis.tarih,
                        urun_id: alis.urun_id,
                        litre: parseFloat(yeniLitre),
                        birim_fiyat: parseFloat(yeniFiyat),
                        tedarikci: yeniTedarikci
                    })
                });
                if (res.ok) {
                    showToast('✅ Alış güncellendi', 'success');
                    loadAlis();
                } else {
                    showToast('❌ Güncelleme hatası', 'error');
                }
            }
        };

        window.deleteAlis = async function(id) {
            if (confirm('Bu alış kaydını silmek istediğinize emin misiniz?')) {
                var res = await fetch('/api/alis/' + id, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    showToast('✅ Alış silindi', 'success');
                    loadAlis();
                } else {
                    showToast('❌ Silme hatası', 'error');
                }
            }
        };

        window.exportAlisToExcel = function() {
            if (tumAlislar.length === 0) {
                showToast('Veri yok', 'warning');
                return;
            }
            var exportData = [];
            for (var i = 0; i < tumAlislar.length; i++) {
                var a = tumAlislar[i];
                exportData.push({
                    Tarih: a.tarih,
                    Urun: a.urun_adi,
                    Litre: a.litre,
                    AlisFiyati: a.birim_fiyat,
                    Toplam: a.toplam_tutar,
                    Tedarikci: a.tedarikci || '-'
                });
            }
            exportToExcel(exportData, 'alislar');
        };

        var alisForm = document.getElementById('alisForm');
        if (alisForm) {
            alisForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                var data = {
                    tarih: document.getElementById('tarih').value,
                    urun_id: parseInt(document.getElementById('urun_id').value),
                    litre: parseFloat(document.getElementById('litre').value),
                    birim_fiyat: parseFloat(document.getElementById('birim_fiyat').value),
                    tedarikci: document.getElementById('tedarikci').value
                };

                var res = await fetch('/api/alis', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast('✅ Alış başarıyla eklendi', 'success');
                    loadAlis();
                    alisForm.reset();
                    setTodayDate('tarih');
                } else {
                    var err = await res.json();
                    showToast('❌ ' + (err.hata || 'Yetkiniz yok'), 'error');
                }
            });
        }

        var aramaInput = document.getElementById('aramaInput');
        if (aramaInput) {
            aramaInput.addEventListener('input', filtreleVeGoster);
        }

        (async function() {
            var me = await fetch('/api/me');
            var user = await me.json();
            yetki = user.yetki;

            if (yetki === 'admin') {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.classList.remove('hidden');
                setTodayDate('tarih');
            } else {
                var adminForm = document.getElementById('adminForm');
                if (adminForm) adminForm.remove();
                var adminElements = document.querySelectorAll('.admin-only');
                for (var i = 0; i < adminElements.length; i++) {
                    if (adminElements[i]) adminElements[i].style.display = 'none';
                }
            }

            await loadUrunler();
            await loadAlis();
        })();
    </script>
</body>

</html>
