<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahsilat | Atay Petrol (İzleyici)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: system-ui;
        }
        
        body {
            background: #e8f4f8;
        }
        
        .navbar {
            background: linear-gradient(135deg, #0A2F6C, #1E4D8C);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar a,
        .navbar button {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 14px;
        }
        
        .navbar a:hover,
        .navbar button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .logout-btn {
            background: #dc2626 !important;
        }
        
        .logout-btn:hover {
            background: #b91c1c !important;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .form-title {
            font-weight: 700;
            margin-bottom: 16px;
            color: #0A2F6C;
            font-size: 18px;
            border-left: 3px solid #0A2F6C;
            padding-left: 12px;
        }
        
        input {
            width: auto;
            padding: 8px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            padding: 16px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            background: #f8fafc;
            font-weight: 600;
            color: #0A2F6C;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">⛽</span>
            <span style="font-weight: 800; font-size: 20px;">ATAY PETROL</span>
            <span style="background: #3B82F620; padding: 2px 10px; border-radius: 40px; font-size: 11px;">İzleyici</span>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <a href="viewer.html">📊 Ana Sayfa</a>
            <a href="borc-viewer.html">📝 Borçlar</a>
            <a href="tahsilat-viewer.html">💵 Tahsilat</a>
            <a href="gider-viewer.html">📉 Giderler</a>
            <a href="rapor.html">📊 Rapor</a>
            <button id="cikisBtn" class="logout-btn">🚪 Çıkış</button>
        </div>
    </div>

    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        <!-- Tarih Seçici -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 24px;">📅</span>
                    <input type="date" id="tarih" style="width: auto;">
                    <button id="bugunBtn" style="background:#0A2F6C;color:white;border:none;padding:8px 16px;border-radius:40px;cursor:pointer;">Bugün</button>
                </div>
                <span style="font-size: 12px; color: #64748b;">Sadece görüntüleme modu</span>
            </div>
        </div>

        <!-- Tahsilat Listesi -->
        <div class="table-container">
            <div class="form-title">📋 Tahsilat Geçmişi</div>
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th>Müşteri</th>
                            <th>Tahsilat</th>
                            <th>Ödeme Türü</th>
                        </tr>
                    </thead>
                    <tbody id="tahsilatListesi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function formatMoney(amount) {
            return (amount || 0).toLocaleString('tr-TR', {
                minimumFractionDigits: 2
            }) + ' ₺';
        }

        async function loadTahsilat() {
            let tarih = document.getElementById('tarih').value || new Date().toISOString().slice(0, 10);
            const res = await fetch(`/api/tahsilat/tarih?tarih=${tarih}`);
            const tahsilatlar = await res.json();
            let html = '';
            for (let t of tahsilatlar) {
                let icon = t.odeme_yontemi === 'Nakit' ? '💵' : (t.odeme_yontemi === 'Havale' ? '🏦' : '💳');
                html += `<tr>
                    <td class="p-2">${t.tarih}</td>
                    <td class="p-2 font-semibold">${t.musteri_adi}</td>
                    <td class="p-2 text-green-600 font-bold">${formatMoney(t.miktar)}</td>
                    <td class="p-2">${icon} ${t.odeme_yontemi || '-'}</td>
                </tr>`;
            }
            if (!tahsilatlar.length) html = '<tr><td colspan="4" class="text-center text-gray-500">Tahsilat bulunamadı</td></tr>';
            document.getElementById('tahsilatListesi').innerHTML = html;
        }

        document.getElementById('cikisBtn').onclick = async() => {
            await fetch('/api/logout', {
                method: 'POST'
            });
            window.location.href = '/';
        };
        document.getElementById('bugunBtn').onclick = () => {
            document.getElementById('tarih').value = new Date().toISOString().slice(0, 10);
            loadTahsilat();
        };
        document.getElementById('tarih').addEventListener('change', () => loadTahsilat());

        document.getElementById('tarih').value = new Date().toISOString().slice(0, 10);
        loadTahsilat();
    </script>
</body>

</html>
